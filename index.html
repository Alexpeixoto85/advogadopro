/* ============================================================
   9.5 — EXTENSÃO: NOTIFICAÇÕES (aniversários + andamentos)
   ============================================================ */
async function buildNotifications(){
  const [prazos,tar,acomp,cli,andamentos] = await Promise.all(['prazos','tarefas','contratosAcomp','clientes','andamentos'].map(dbAll));
  const today = todayISO();
  const items = [];

  prazos.filter(p=>p.status!=='cumprido').forEach(p=>{
    const d = daysUntil(p.dataPrazo); if(d===null) return;
    if(d<0) items.push({id:'prazo_'+p.id, type:'danger', icon:ICON.deadline, title:'Prazo vencido', desc: esc(p.descricao||''), time: fmtDate(p.dataPrazo)});
    else if(d<=3) items.push({id:'prazo_'+p.id, type:'warn', icon:ICON.deadline, title:`Prazo em ${d===0?'hoje':d+' dia(s)'}`, desc: esc(p.descricao||''), time: fmtDate(p.dataPrazo)});
    else if(d<=7) items.push({id:'prazo_'+p.id, type:'info', icon:ICON.deadline, title:`Prazo em ${d} dias`, desc: esc(p.descricao||''), time: fmtDate(p.dataPrazo)});
  });

  tar.filter(t=>t.status!=='concluido'&&t.dataVencimento&&t.dataVencimento<today).forEach(t=>{
    items.push({id:'tar_'+t.id, type:'warn', icon:ICON.tasks, title:'Tarefa em atraso', desc: esc(t.titulo||''), time: fmtDate(t.dataVencimento)});
  });

  acomp.forEach(c=>{(c.parcelas||[]).forEach(p=>{
    const d=daysUntil(p.vencimento);
    if(p.status!=='pago'&&d!==null&&d<0){
      items.push({id:'mens_'+c.id+'_'+p.competencia, type:'danger', icon:ICON.finance, title:'Mensalidade em atraso', desc: esc((c.numero||'Contrato')+' — '+moneyBR(p.valor)), time: fmtDate(p.vencimento)});
    }
  });});

  // NOVO: aniversários nos próximos 7 dias
  cli.forEach(c=>{
    if(!c.dataNascimento) return;
    const d=daysToBirthday(c.dataNascimento);
    if(d!==null&&d<=7){
      items.push({id:'aniv_'+c.id+'_'+(new Date().getFullYear()), type:'info', icon:ICON.cake,
        title: d===0?'Aniversário hoje 🎂':`Aniversário em ${d} dia(s)`, desc: esc(c.nome), time: fmtDate(c.dataNascimento)});
    }
  });

  // NOVO: andamentos que requerem ação
  andamentos.filter(a=>a.requerAcao).forEach(a=>{
    items.push({id:'mov_'+a.id, type:'warn', icon:ICON.activity, title:'Movimentação requer ação', desc: esc((a.tipo?a.tipo+': ':'')+(a.descricao||'')).slice(0,90), time: fmtDate(a.data)});
  });

  const unread = items.filter(i=>!_notifRead.has(i.id));
  const badge = $('#notifBadge');
  if(badge){
    if(unread.length>0){ badge.textContent=unread.length>9?'9+':unread.length; badge.classList.add('show'); }
    else badge.classList.remove('show');
  }
  const list = $('#notifList'); if(!list) return;
  if(!items.length){ list.innerHTML=`<div class="notif-empty">Nenhuma notificação pendente</div>`; return; }
  const colorMap={danger:'var(--red-bg)',warn:'var(--amber-bg)',info:'var(--blue-bg)'};
  const textMap={danger:'var(--red)',warn:'var(--amber)',info:'var(--blue)'};
  list.innerHTML = items.map(i=>`
    <div class="notif-item${_notifRead.has(i.id)?'':' unread'}" onclick="readNotif('${i.id}')">
      <div class="notif-ico" style="background:${colorMap[i.type]||'var(--parch-2)'};color:${textMap[i.type]||'var(--text-2)'}">${svg(i.icon,1.8,16)}</div>
      <div class="notif-body"><div class="notif-title">${i.title}</div><div class="notif-desc">${i.desc}</div><div class="notif-time">${i.time}</div></div>
    </div>`).join('');
}

async function runGlobalSearch(q){
  const panel = $('#searchPanel'); const results = $('#searchResults');
  if(!q||q.length<2){ panel.classList.remove('show'); return; }
  panel.classList.add('show');
  results.innerHTML = `<div class="search-empty">Buscando...</div>`;
  const [cli, proc, prazos, fin, leads] = await Promise.all(['clientes','processos','prazos','financeiro','leads'].map(dbAll));
  const ql = q.toLowerCase(); const hits = [];
  cli.filter(c=>(c.nome||'').toLowerCase().includes(ql)||(c.cpfCnpj||'').includes(ql)).slice(0,4).forEach(c=>{
    hits.push({section:'Clientes',icon:ICON.clients,color:'var(--blue-bg)',textColor:'var(--blue)',title:c.nome,meta:(c.cpfCnpj?maskCpfCnpj(c.cpfCnpj)+' · ':'')+(c.tipo||''),nav:'clientes'});});
  proc.filter(p=>(p.numero||'').toLowerCase().includes(ql)||(p.tipoAcao||'').toLowerCase().includes(ql)).slice(0,4).forEach(p=>{
    hits.push({section:'Processos',icon:ICON.cases,color:'var(--amber-bg)',textColor:'var(--amber)',title:p.tipoAcao||p.numero||'Processo',meta:(p.numero?p.numero+' · ':'')+( p.area||''),nav:'processos'});});
  leads.filter(l=>(l.nome||'').toLowerCase().includes(ql)).slice(0,3).forEach(l=>{
    hits.push({section:'Captação (CRM)',icon:ICON.funnel,color:'var(--parch-2)',textColor:'var(--brass-deep)',title:l.nome,meta:(l.area?l.area+' · ':'')+((LEAD_ETAPAS.find(e=>e[0]===(l.etapa||'novo'))||['','—'])[1]),nav:'crm'});});
  prazos.filter(p=>(p.descricao||'').toLowerCase().includes(ql)).slice(0,3).forEach(p=>{
    hits.push({section:'Prazos',icon:ICON.deadline,color:'var(--red-bg)',textColor:'var(--red)',title:p.descricao,meta:'Vence: '+fmtDate(p.dataPrazo),nav:'prazos'});});
  fin.filter(f=>(f.descricao||'').toLowerCase().includes(ql)).slice(0,3).forEach(f=>{
    hits.push({section:'Financeiro',icon:ICON.finance,color:'var(--green-bg)',textColor:'var(--green)',title:f.descricao,meta:moneyBR(f.valor)+' · '+fmtDate(f.data),nav:'financeiro'});});
  if(!hits.length){ results.innerHTML=`<div class="search-empty">Nenhum resultado para "<b>${esc(q)}</b>"</div>`; return; }
  let html=''; let lastSec='';
  hits.forEach(h=>{
    if(h.section!==lastSec){ html+=`<div class="search-section-lbl">${h.section}</div>`; lastSec=h.section; }
    html+=`<div class="search-hit" onclick="goto('${h.nav}');closeSearch()">
      <div class="search-hit-ico" style="background:${h.color};color:${h.textColor}">${svg(h.icon,1.8,15)}</div>
      <div class="search-hit-body"><div class="search-hit-title">${esc(h.title)}</div><div class="search-hit-meta">${esc(h.meta)}</div></div>
    </div>`;
  });
  results.innerHTML=html;
}

/* ---------- Módulo de Ativação ---------- */
var _LexActivation = (function(){
  'use strict';
  const KEY=_LEXLIC_CFG.STORE_CODE;

  function parseCode(raw){ const binId=(raw||'').trim(); if(!binId) return null; return {binId, apiKey:_LEXLIC_CFG.API_KEY}; }
  function getSaved(){ try{ return JSON.parse(localStorage.getItem(KEY)||'null'); }catch(e){ return null; } }
  function save(obj){ try{ localStorage.setItem(KEY, JSON.stringify(obj)); }catch(e){} }
  function show(){ const m=document.getElementById('lxActModal'); if(m) m.classList.add('_show'); setTimeout(()=>{ const i=document.getElementById('lxActInput'); if(i) i.focus(); },250); }
  function hide(){ const m=document.getElementById('lxActModal'); if(m) m.classList.remove('_show'); }
  function setLoading(on){ const b=document.getElementById('lxActBtn'),s=document.getElementById('lxActSpin'),t=document.getElementById('lxActBtnTxt'); if(b)b.disabled=on; if(s)s.style.display=on?'block':'none'; if(t)t.style.display=on?'none':'inline-flex'; }
  function setErr(msg){ const e=document.getElementById('lxActErr'); if(!e)return; e.textContent=msg||''; e.classList.toggle('_show',!!msg); }
  function toggleEye(){ const i=document.getElementById('lxActInput'); if(i) i.type = i.type==='password'?'text':'password'; }

  function confirmar(){
    const parsed=parseCode(document.getElementById('lxActInput').value);
    if(!parsed){ setErr('Código inválido. Verifique e tente novamente.'); return; }
    if(!parsed.apiKey || parsed.apiKey.indexOf('COLE_AQUI')===0){ setErr('Sistema não configurado: defina a API_KEY no código.'); return; }
    setLoading(true); setErr('');
    fetch('https://api.jsonbin.io/v3/b/'+parsed.binId+'/latest',{headers:{'X-Master-Key':parsed.apiKey,'X-Bin-Meta':false}})
      .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(()=>{ save(parsed); hide(); setLoading(false); _LexLicense.run(parsed); })
      .catch(()=>{ setLoading(false); setErr('Código inválido ou sem conexão. Verifique e tente novamente.'); });
  }

  function init(){
    const saved=getSaved();
    if(saved && saved.binId && saved.apiKey){ _LexLicense.run(saved); }
    else { show(); }
  }

  return { init, confirmar, toggleEye, parseCode, save };
})();

/* ---------- Módulo de Verificação de Licença (fingerprint) ---------- */
var _LexLicense = (function(){
  'use strict';

  function fp(){
    const raw=[navigator.userAgent,navigator.language||'',screen.width+'x'+screen.height,screen.colorDepth||'',new Date().getTimezoneOffset(),navigator.hardwareConcurrency||'',navigator.platform||''].join('|');
    let h=5381; for(let i=0;i<raw.length;i++){ h=((h<<5)+h)+raw.charCodeAt(i); h=h&h; }
    return 'FP_'+Math.abs(h).toString(36).toUpperCase();
  }
  function deviceLabel(){
    const ua=navigator.userAgent; let os='Desconhecido';
    if(/Windows NT 10/.test(ua))os='Windows 10/11'; else if(/Windows/.test(ua))os='Windows';
    else if(/Mac OS X/.test(ua))os='Mac'; else if(/Android/.test(ua))os='Android';
    else if(/iPhone/.test(ua))os='iPhone'; else if(/iPad/.test(ua))os='iPad'; else if(/Linux/.test(ua))os='Linux';
    let br='Navegador';
    if(/Chrome\//.test(ua)&&!/Edg\//.test(ua))br='Chrome'; else if(/Firefox\//.test(ua))br='Firefox';
    else if(/Edg\//.test(ua))br='Edge'; else if(/Safari\//.test(ua)&&!/Chrome/.test(ua))br='Safari';
    return os+' · '+br+' · '+new Date().toLocaleDateString('pt-BR');
  }
  function showLoad(){ const l=document.getElementById('lxLicLoading'); if(l) l.classList.remove('_hide'); }
  function allow(){ const l=document.getElementById('lxLicLoading'); if(l) l.classList.add('_hide'); }
  function block(label){
    allow();
    const dev=document.getElementById('lxLicDev'); if(dev) dev.textContent=label||'Outro dispositivo';
    const wa=document.getElementById('lxLicWa'); if(wa) wa.href='https://wa.me/'+_LEXLIC_CFG.WHATSAPP+'?text='+encodeURIComponent('Olá! Gostaria de adquirir uma nova licença do '+_LEXLIC_CFG.PRODUTO+' para outro dispositivo.');
    const w=document.getElementById('lxLicWall'); if(w) w.classList.add('_show');
  }

  function fetchBin(c,cb){ fetch('https://api.jsonbin.io/v3/b/'+c.binId+'/latest',{headers:{'X-Master-Key':c.apiKey,'X-Bin-Meta':false}}).then(r=>r.json()).then(d=>cb(null,d.record||d)).catch(e=>cb(e,null)); }
  function saveBin(c,rec,cb){ fetch('https://api.jsonbin.io/v3/b/'+c.binId,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':c.apiKey},body:JSON.stringify(rec)}).then(r=>r.json()).then(d=>cb(null,d)).catch(e=>cb(e,null)); }

  function setLockLoading(on){ const b=document.getElementById('lxLicBtn'),s=document.getElementById('lxLicSpin'),t=document.getElementById('lxLicBtnTxt'); if(b)b.disabled=on; if(s)s.style.display=on?'block':'none'; if(t)t.style.display=on?'none':'inline-flex'; }
  function setLockErr(msg){ const e=document.getElementById('lxLicErr'); if(!e)return; e.textContent=msg||''; e.classList.toggle('_show',!!msg); }
  function toggleEyeLock(){ const i=document.getElementById('lxLicInput'); if(i) i.type = i.type==='password'?'text':'password'; }

  function confirmarNovaLicenca(){
    const parsed=_LexActivation.parseCode(document.getElementById('lxLicInput').value);
    if(!parsed){ setLockErr('Código inválido. Verifique e tente novamente.'); return; }
    setLockLoading(true); setLockErr('');
    fetch('https://api.jsonbin.io/v3/b/'+parsed.binId+'/latest',{headers:{'X-Master-Key':parsed.apiKey,'X-Bin-Meta':false}})
      .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(()=>{ setLockLoading(false); _LexActivation.save(parsed); try{ localStorage.removeItem(_LEXLIC_CFG.STORE_FP); }catch(e){} location.reload(); })
      .catch(()=>{ setLockLoading(false); setLockErr('Código inválido ou sem conexão.'); });
  }

  function run(creds){
    const licKey=(location.hostname||'local').replace(/\./g,'_');
    const myFp=fp(), myLabel=deviceLabel();
    try{ const cached=localStorage.getItem(_LEXLIC_CFG.STORE_FP); if(cached && cached===myFp){ allow(); return; } }catch(e){}
    showLoad();
    fetchBin(creds,(err,record)=>{
      if(err||!record){ if(_LEXLIC_CFG.FAIL_OPEN){ allow(); } else { block('Sem conexão para validar a licença'); } return; }
      const licenses=record.licenses||{};
      if(!licenses[licKey]){
        licenses[licKey]={fingerprint:myFp,label:myLabel,registeredAt:new Date().toISOString()};
        record.licenses=licenses;
        saveBin(creds,record,()=>{ try{ localStorage.setItem(_LEXLIC_CFG.STORE_FP,myFp); }catch(e){} allow(); });
      } else {
        const reg=licenses[licKey];
        if(reg.fingerprint===myFp){ try{ localStorage.setItem(_LEXLIC_CFG.STORE_FP,myFp); }catch(e){} allow(); }
        else { let d=''; try{ d=new Date(reg.registeredAt).toLocaleDateString('pt-BR'); }catch(e){} block(reg.label||('Registrado em '+d)); }
      }
    });
  }

  return { run, confirmarNovaLicenca, toggleEyeLock };
})();

/* ---------- liga os botões e inicializa ---------- */
(function(){
  function bind(id,fn){ const el=document.getElementById(id); if(el) el.addEventListener(fn.ev||'click',fn.cb); }
  const wire=()=>{
    const map=[
      ['lxActBtn','click',()=>_LexActivation.confirmar()],
      ['lxActEye','click',()=>_LexActivation.toggleEye()],
      ['lxActInput','keydown',e=>{ if(e.key==='Enter') _LexActivation.confirmar(); }],
      ['lxLicBtn','click',()=>_LexLicense.confirmarNovaLicenca()],
      ['lxLicEye','click',()=>_LexLicense.toggleEyeLock()],
      ['lxLicInput','keydown',e=>{ if(e.key==='Enter') _LexLicense.confirmarNovaLicenca(); }],
    ];
    map.forEach(([id,ev,cb])=>{ const el=document.getElementById(id); if(el) el.addEventListener(ev,cb); });
    _LexActivation.init();
  };
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',wire);
  else wire();
})();

</script>

}

/* Tela de login confortável em telas pequenas */

  #authScreen{ align-items:stretch; padding:0; }

<script>
(function () {
  'use strict';
  const ICONS = {
    dashboard: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>',
    processos: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M5 7l-2 5h4l-2-5zM19 7l-2 5h4l-2-5zM3 12a2 2 0 0 0 4 0M17 12a2 2 0 0 0 4 0M5 7l7-2 7 2M8 21h8"/></svg>',
    clientes: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>',
    agenda: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
    more: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>'
  };
  const MNAV = [['dashboard', 'Painel'], ['processos', 'Processos'], ['clientes', 'Clientes'], ['agenda', 'Agenda'], ['__more', 'Mais']];

  function canAccess(id) { try { return (typeof userCanAccess === 'function') ? userCanAccess(id) : true; } catch (e) { return true; } }

  function setupMobileSearch() {
    const topbar = document.querySelector('.topbar'); if (!topbar) return;
    if (document.getElementById('mSearchBtn')) return;
    const wrap = document.querySelector('.search-topbar-wrap'); if (!wrap) return;
    const btn = document.createElement('button');
    btn.id = 'mSearchBtn'; btn.className = 'm-search-btn'; btn.type = 'button'; btn.setAttribute('aria-label', 'Buscar');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>';
    wrap.parentNode.insertBefore(btn, wrap);
    btn.onclick = () => {
      document.body.classList.toggle('m-search-open');
      if (document.body.classList.contains('m-search-open')) { const i = document.getElementById('globalSearch'); if (i) setTimeout(() => i.focus(), 60); }
    };
  }

  function buildBottomNav() {
    if (document.getElementById('mNav')) return;
    const bar = document.createElement('nav'); bar.id = 'mNav'; bar.setAttribute('aria-label', 'Navegação');
    MNAV.forEach(([id, label]) => {
      if (id !== '__more' && !canAccess(id)) return;
      const b = document.createElement('button'); b.type = 'button'; b.dataset.page = id;
      b.innerHTML = (ICONS[id] || ICONS.more) + '<span>' + label + '</span>';
      b.onclick = () => {
        document.body.classList.remove('m-search-open');
        if (id === '__more') { if (typeof openSidebar === 'function') openSidebar(); return; }
        if (typeof goto === 'function') goto(id);
      };
      bar.appendChild(b);
    });
    document.body.appendChild(bar);
  }
  function syncBottomNavActive() {
    const cur = (typeof current !== 'undefined') ? current : null;
    document.querySelectorAll('#mNav button').forEach(b => b.classList.toggle('active', b.dataset.page === cur));
  }

  function wrapTables() {
    const c = document.getElementById('content'); if (!c) return;
    c.querySelectorAll('table').forEach(t => {
      const p = t.parentElement; if (!p) return;
      if (p.classList.contains('m-tbl-scroll') || p.classList.contains('tbl-scroll')) return;
      const w = document.createElement('div'); w.className = 'm-tbl-scroll';
      p.insertBefore(w, t); w.appendChild(t);
    });
  }

  let booted = false;
  function boot() {
    const shell = document.getElementById('appShell');
    if (!shell || shell.style.display === 'none') return;   // espera o login concluir
    if (booted) return; booted = true;
    setupMobileSearch();
    buildBottomNav();
    const content = document.getElementById('content');
    if (content) {
      const obs = new MutationObserver(() => {
        wrapTables();
        syncBottomNavActive();
        document.body.classList.remove('m-search-open');   // fecha a busca ao navegar
      });
      obs.observe(content, { childList: true, subtree: true });
      wrapTables(); syncBottomNavActive();
    }
  }
  const _t = setInterval(() => { try { boot(); } catch (e) {} if (booted) clearInterval(_t); }, 600);
  window.addEventListener('load', () => setTimeout(() => { try { boot(); } catch (e) {} }, 400));
})();
</script>

<!-- ============================================================
     Lexora — Sincronização automática na nuvem (Repositório GitHub)
     Sincroniza todas as stores do IndexedDB (lexora_db) + configurações do
     localStorage entre dispositivos usando um REPOSITÓRIO PRIVADO do GitHub
     (via Git Data API). Suporta arquivos grandes (anexos/logos) e preserva
     Blobs/Datas. Acessa o banco pela camada já existente (db / dbAll / dbClear).
============================================================ -->
<script>
(function () {
  'use strict';

  const DB_NAME = 'lexora_db';
  const REPO_DEFAULT = 'lexora-sync';
  let BRANCH = 'main';
  let branchResolved = false;
  const MANIFEST = 'lexora-sync.json';
  const STORE_DIR = 'stores/';
  const PUSH_DELAY = 900;
  const LIGHT_STORE_LIMIT = 512 * 1024;
  const CHUNK_LIMIT = 7 * 1024 * 1024;
  const LIGHT_LS_LIMIT = 200 * 1024;

  // Chaves de localStorage que NÃO sincronizam (licença/dispositivo/estado local)
  const LS_BLOCK_EXACT = ['lexora_actcode', 'lexora_fp', 'lexora_notif_read'];
  function isBlockedLS(k) {
    if (!k) return true;
    if (k.indexOf('__sync_') === 0) return true;
    return LS_BLOCK_EXACT.indexOf(k) >= 0;
  }

  let applying = false, booted = false;
  let TOKEN = null, OWNER = null, REPO = null, enabled = false, DEVICE = null;
  let lastPulledAt = null, lastPushedAt = null;
  let dirty = false, busy = false, conflict = false, pendingPush = false, pushTimer = null;
  let lastError = '', lastSize = 0, syncedHeavy = [];
  let statusText = 'Não configurado';

  /* ---------- Detecção de alterações no IndexedDB ---------- */
  function hookIDB(proto, method) {
    if (!proto || !proto[method] || proto['__sync_wrapped_' + method]) return;
    const orig = proto[method];
    proto[method] = function () {
      try {
        const tx = this.transaction || (this.source && this.source.transaction);
        if (!applying && tx && tx.db && tx.db.name === DB_NAME) markDirty();
      } catch (e) {}

    proto['__sync_wrapped_' + method] = true;
  }
  try {
    hookIDB(window.IDBObjectStore && IDBObjectStore.prototype, 'put');
    hookIDB(window.IDBObjectStore && IDBObjectStore.prototype, 'add');
    hookIDB(window.IDBObjectStore && IDBObjectStore.prototype, 'delete');
    hookIDB(window.IDBObjectStore && IDBObjectStore.prototype, 'clear');
    hookIDB(window.IDBCursor && IDBCursor.prototype, 'update');
    hookIDB(window.IDBCursor && IDBCursor.prototype, 'delete');

  const _lsSet = localStorage.setItem.bind(localStorage);
  const _lsRemove = localStorage.removeItem.bind(localStorage);
  localStorage.setItem = function (k, v) { _lsSet(k, v); if (!applying && !isBlockedLS(k)) markDirty(); };
  localStorage.removeItem = function (k) { _lsRemove(k); if (!applying && !isBlockedLS(k)) markDirty(); };

  /* ---------- Acesso ao IndexedDB (camada do app) ---------- */
  function theDb() { return (typeof db !== 'undefined' && db) ? db : (window.db || null); }
  function dbReady() { try { const d = theDb(); return !!(d && d.objectStoreNames && d.objectStoreNames.length); } catch (e) { return false; } }
  function storeNames() { try { return Array.from(theDb().objectStoreNames); } catch (e) { return []; } }
  function loginDone() {
    const a = document.getElementById('authScreen');
    const authHidden = !a || a.style.display === 'none' || getComputedStyle(a).display === 'none';
    const shell = document.getElementById('appShell');
    const shellOn = shell && shell.style.display !== 'none';
    return authHidden && !!shellOn;
  }
  async function readAll(s) { return (typeof dbAll === 'function') ? await dbAll(s) : []; }
  async function clearStore(s) { if (typeof dbClear === 'function') return await dbClear(s); }
  function putRecordsBatch(store, recs) {
    return new Promise((resolve, reject) => {
      try {
        const tx = theDb().transaction(store, 'readwrite');
        const os = tx.objectStore(store);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
        for (const r of recs) { try { os.put(r); } catch (e) {} }
      } catch (e) { reject(e); }
    });
  }

  /* ---------- Utilidades: bytes / base64 / git sha ---------- */
  function strToBytes(s) { return new TextEncoder().encode(s); }
  function bytesToStr(b) { return new TextDecoder().decode(b); }
  function bytesToB64(bytes) {
    let bin = ''; const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    return btoa(bin);
  }
  function b64ToBytes(b64) {
    const bin = atob((b64 || '').replace(/\s/g, '')); const len = bin.length;
    const out = new Uint8Array(len); for (let i = 0; i < len; i++) out[i] = bin.charCodeAt(i); return out;
  }
  async function gitBlobSha(bytes) {
    try {
      if (!(window.crypto && crypto.subtle)) return null;
      const header = strToBytes('blob ' + bytes.length + '\u0000');
      const full = new Uint8Array(header.length + bytes.length);
      full.set(header, 0); full.set(bytes, header.length);
      const d = await crypto.subtle.digest('SHA-1', full);
      return Array.from(new Uint8Array(d)).map(b => b.toString(16).padStart(2, '0')).join('');
    } catch (e) { return null; }
  }

  /* ---------- Serialização que preserva Blobs/ArrayBuffers/Dates ---------- */
  function needsConv(v) {
    if (v instanceof Blob || v instanceof ArrayBuffer || ArrayBuffer.isView(v) || v instanceof Date) return true;
    if (Array.isArray(v)) { for (const x of v) if (needsConv(x)) return true; return false; }
    if (v && typeof v === 'object') { for (const k in v) if (Object.prototype.hasOwnProperty.call(v, k) && needsConv(v[k])) return true; return false; }
    return false;
  }
  async function serializeValue(v) {
    if (v instanceof Blob) { const buf = await v.arrayBuffer(); return { __BIN__: { t: 'blob', type: v.type || '', b64: bytesToB64(new Uint8Array(buf)) } }; }
    if (v instanceof ArrayBuffer) return { __BIN__: { t: 'ab', b64: bytesToB64(new Uint8Array(v)) } };
    if (ArrayBuffer.isView(v)) return { __BIN__: { t: 'u8', b64: bytesToB64(new Uint8Array(v.buffer, v.byteOffset, v.byteLength)) } };
    if (v instanceof Date) return { __BIN__: { t: 'date', iso: v.toISOString() } };
    if (Array.isArray(v)) { const out = []; for (const x of v) out.push(needsConv(x) ? await serializeValue(x) : x); return out; }
    if (v && typeof v === 'object') { const out = {}; for (const k in v) if (Object.prototype.hasOwnProperty.call(v, k)) { const val = v[k]; out[k] = needsConv(val) ? await serializeValue(val) : val; } return out; }
    return v;
  }
  async function serializeRecs(recs) {
    if (!needsConv(recs)) return recs;
    const out = []; for (const r of (recs || [])) out.push(needsConv(r) ? await serializeValue(r) : r); return out;
  }
  function deserializeValue(v) {
    if (v && typeof v === 'object') {
      if (v.__BIN__) {
        const b = v.__BIN__;
        if (b.t === 'blob') return new Blob([b64ToBytes(b.b64)], { type: b.type || '' });
        if (b.t === 'ab') return b64ToBytes(b.b64).buffer;
        if (b.t === 'u8') return b64ToBytes(b.b64);
        if (b.t === 'date') return new Date(b.iso);
        return v;
      }
      if (Array.isArray(v)) return v.map(deserializeValue);
      const out = {}; for (const k in v) if (Object.prototype.hasOwnProperty.call(v, k)) out[k] = deserializeValue(v[k]); return out;
    }
    return v;
  }
  function deserializeRecs(recs) { return Array.isArray(recs) ? recs.map(deserializeValue) : (recs || []); }

  /* ---------- Montagem dos dados ---------- */
  async function collectStores() {
    const light = {}, heavy = {};
    for (const s of storeNames()) {
      let recs = []; try { recs = await readAll(s); } catch (e) { recs = []; }
      let safe; try { safe = await serializeRecs(recs); } catch (e) { safe = recs; }
      let size; try { size = strToBytes(JSON.stringify(safe)).length; } catch (e) { size = Infinity; }
      if (size > LIGHT_STORE_LIMIT) heavy[s] = safe; else light[s] = safe;
    }
    return { light: light, heavy: heavy };
  }
  function collectLS() {
    const ls = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i); if (isBlockedLS(k)) continue;
      const val = localStorage.getItem(k);
      if (val != null && val.length <= LIGHT_LS_LIMIT) ls[k] = val;
    }
    return ls;
  }
  function chunkStoreBytes(safeRecs) {
    const full = strToBytes(JSON.stringify(safeRecs || []));
    const parts = [];
    if (full.length === 0) { parts.push(strToBytes('[]')); return parts; }
    for (let off = 0; off < full.length; off += CHUNK_LIMIT) parts.push(full.subarray(off, Math.min(off + CHUNK_LIMIT, full.length)));
    return parts;
  }

  async function applyData(stores, ls) {
    applying = true;
    try {
      const existing = storeNames();
      for (const s of Object.keys(stores)) {
        if (existing.indexOf(s) < 0) continue;
        try { await clearStore(s); } catch (e) {}
        const recs = deserializeRecs(stores[s] || []);
        if (recs.length) { try { await putRecordsBatch(s, recs); } catch (e) {} }
      }
      if (ls) {
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i); if (isBlockedLS(k)) continue;
          if (!(k in ls)) { const v = localStorage.getItem(k); if (v != null && v.length <= LIGHT_LS_LIMIT) _lsRemove(k); }
        }
        for (const k in ls) { try { _lsSet(k, ls[k]); } catch (e) {} }
      }
    } finally { applying = false; }
  }

  // Refresh suave: re-renderiza a página atual (os renderers releem o banco) — sem novo login.
  function refreshApp() {
    try {
      if (typeof goto === 'function' && typeof current !== 'undefined' && current) { goto(current); return; }
    } catch (e) {}
    try { location.reload(); } catch (e) {}
  }

  /* ---------- Config ---------- */
  function cfgGet(k) { try { return localStorage.getItem('__sync_' + k); } catch (e) { return null; } }
  function cfgSet(k, v) { try { _lsSet('__sync_' + k, v); } catch (e) {} }
  function cfgDel(k) { try { _lsRemove('__sync_' + k); } catch (e) {} }
  function loadCfg() {
    TOKEN = cfgGet('token'); OWNER = cfgGet('owner'); REPO = cfgGet('repo') || REPO_DEFAULT;
    enabled = cfgGet('enabled') === '1' && !!TOKEN && !!OWNER && !!REPO;
    lastPulledAt = cfgGet('lastPulledAt'); lastPushedAt = cfgGet('lastPushedAt');
    DEVICE = cfgGet('device');
    if (!DEVICE) { DEVICE = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36); cfgSet('device', DEVICE); }
  }

  /* ---------- Toast ---------- */
  function toast(msg, type) {
    try { if (typeof window.toast === 'function' && window.toast !== toast) { const tt = type === 'error' ? 'err' : (type === 'success' ? 'ok' : (type || 'ok')); window.toast(msg, tt); return; } } catch (e) {}
    try {
      let host = document.getElementById('__sync_toast');
      if (!host) { host = document.createElement('div'); host.id = '__sync_toast'; host.style.cssText = 'position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:99999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;'; document.body.appendChild(host); }
      const el = document.createElement('div');
      const bg = type === 'error' ? '#b23a3a' : (type === 'success' ? '#3f7d54' : '#16243f');
      el.style.cssText = 'background:' + bg + ';color:#fff;padding:10px 16px;border-radius:10px;font:600 13px system-ui;box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:88vw;text-align:center;';
      el.textContent = msg; host.appendChild(el);
      setTimeout(() => { el.style.transition = 'opacity .4s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }, 3000);
    } catch (e) {}
  }

  /* ---------- GitHub: repositório privado via Git Data API ---------- */
  function ghHeaders(extra) {
    return Object.assign({ 'Authorization': 'Bearer ' + TOKEN, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' }, extra || {});
  }
  async function ghJSON(url, opts) {
    const r = await fetch(url, opts || { headers: ghHeaders() });
    if (r.status === 404) return { __404: true };
    if (!r.ok) {
      let detail = ''; try { detail = (await r.json()).message || ''; } catch (e) {}
      throw new Error('GitHub ' + r.status + (r.status === 401 ? ' (token inválido/expirado)' : r.status === 403 ? ' (sem permissão — o token precisa do escopo "repo")' : (detail ? ' — ' + detail : '')));
    }
    if (r.status === 204) return {};
    try { return await r.json(); } catch (e) { return {}; }
  }
  async function ghWhoAmI() {
    const u = await ghJSON('https://api.github.com/user', { headers: ghHeaders() });
    if (u.__404 || !u.login) throw new Error('Não foi possível identificar a conta do GitHub');
    return u.login;
  }
  async function ghGetRef() {
    const ref = await ghJSON('https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/ref/heads/' + BRANCH, { headers: ghHeaders() });
    if (ref.__404 || !ref.object) return null;
    return ref.object.sha;
  }
  async function ensureBranch() {
    if (branchResolved) return;
    try {
      const got = await ghJSON('https://api.github.com/repos/' + OWNER + '/' + REPO, { headers: ghHeaders() });
      if (!got.__404 && got.default_branch) BRANCH = got.default_branch;
      branchResolved = true;
    } catch (e) {}
  }
  async function ghEnsureRepo() {
    let got = await ghJSON('https://api.github.com/repos/' + OWNER + '/' + REPO, { headers: ghHeaders() });
    if (got.__404) {
      await ghJSON('https://api.github.com/user/repos', {
        method: 'POST', headers: ghHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ name: REPO, private: true, auto_init: true, description: 'Lexora — sincronização (não editar manualmente)' })
      });
      for (let i = 0; i < 10; i++) { await new Promise(res => setTimeout(res, 800)); got = await ghJSON('https://api.github.com/repos/' + OWNER + '/' + REPO, { headers: ghHeaders() }); if (!got.__404) break; }
    }
    if (got && !got.__404 && got.default_branch) BRANCH = got.default_branch;
    branchResolved = true;
    for (let i = 0; i < 10; i++) { if (await ghGetRef()) return true; await new Promise(res => setTimeout(res, 800)); }
    return true;
  }
  async function ghGetTreeMap(commitSha) {
    const commit = await ghJSON('https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/commits/' + commitSha, { headers: ghHeaders() });
    const treeSha = commit.tree && commit.tree.sha;
    const tree = await ghJSON('https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/trees/' + treeSha + '?recursive=1', { headers: ghHeaders() });
    const files = {};
    (tree.tree || []).forEach(e => { if (e.type === 'blob') files[e.path] = e.sha; });
    return { headCommit: commitSha, treeSha: treeSha, files: files };
  }
  async function ghReadBlobBytes(sha) {
    const b = await ghJSON('https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/blobs/' + sha, { headers: ghHeaders() });
    if (b.__404) return new Uint8Array();
    if (b.encoding === 'base64') return b64ToBytes(b.content);
    return strToBytes(b.content || '');
  }
  async function ghReadBlobText(sha) { return bytesToStr(await ghReadBlobBytes(sha)); }
  async function ghCreateBlob(bytes) {
    const res = await ghJSON('https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/blobs', {
      method: 'POST', headers: ghHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ content: bytesToB64(bytes), encoding: 'base64' })
    });
    return res.sha;
  }
  async function ghCommitFiles(desired, baseCommitSha, baseFiles) {
    const treeEntries = []; const desiredPaths = {};
    for (const f of desired) {
      desiredPaths[f.path] = true;
      let sha = null;
      const local = await gitBlobSha(f.bytes);
      if (local && baseFiles[f.path] === local) sha = baseFiles[f.path];
      if (!sha) sha = await ghCreateBlob(f.bytes);
      treeEntries.push({ path: f.path, mode: '100644', type: 'blob', sha: sha });
    }
    for (const path in baseFiles) {
      if (desiredPaths[path]) continue;
      if (path === MANIFEST || path.indexOf(STORE_DIR) === 0) treeEntries.push({ path: path, mode: '100644', type: 'blob', sha: null });
    }
    const baseCommit = await ghJSON('https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/commits/' + baseCommitSha, { headers: ghHeaders() });
    const newTree = await ghJSON('https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/trees', {
      method: 'POST', headers: ghHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ base_tree: baseCommit.tree.sha, tree: treeEntries })
    });
    const newCommit = await ghJSON('https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/commits', {
      method: 'POST', headers: ghHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ message: 'sync ' + new Date().toISOString(), tree: newTree.sha, parents: [baseCommitSha] })
    });
    await ghJSON('https://api.github.com/repos/' + OWNER + '/' + REPO + '/git/refs/heads/' + BRANCH, {
      method: 'PATCH', headers: ghHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ sha: newCommit.sha, force: false })

    return newCommit.sha;
  }

  function setStatus(s) { statusText = s; const e = document.getElementById('sync-status'); if (e) e.textContent = s; }

  /* ---------- Baixar (pull) ---------- */
  async function doPull(force) {
    if (!enabled || !TOKEN || !OWNER || !REPO || applying || busy || !dbReady()) return false;
    busy = true; setStatus('Verificando nuvem…'); renderPanel();
    let ok = false, changed = false;
    try {
      await ensureBranch();
      const head = await ghGetRef();
      if (!head) { setStatus('Sincronizado'); ok = true; lastError = ''; }
      else {
        const map = await ghGetTreeMap(head);
        const manSha = map.files[MANIFEST];
        if (!manSha) { setStatus('Sincronizado'); ok = true; lastError = ''; }
        else {
          const man = JSON.parse(await ghReadBlobText(manSha));
          const isNewer = force || !lastPulledAt || (man.updatedAt && man.updatedAt > lastPulledAt);
          const isOurs = man.device === DEVICE && man.updatedAt === lastPushedAt;
          if (isNewer && !isOurs) {
            setStatus('Baixando…'); renderPanel();
            const stores = Object.assign({}, man.stores || {});
            const heavy = man.heavy || [];
            for (const h of heavy) {
              const parts = h.parts || 1;
              const chunks = [];
              for (let p = 0; p < parts; p++) {
                const path = STORE_DIR + h.name + '.part' + p + '.json';
                const sha = map.files[path];
                if (!sha) continue;
                try { chunks.push(await ghReadBlobBytes(sha)); } catch (e) {}
              }
              let recs = [];
              try {
                let totalLen = 0; chunks.forEach(c => totalLen += c.length);
                const merged = new Uint8Array(totalLen); let off = 0;
                chunks.forEach(c => { merged.set(c, off); off += c.length; });
                const arr = JSON.parse(bytesToStr(merged));
                if (Array.isArray(arr)) recs = arr;
              } catch (e) {}
              stores[h.name] = recs;
            }
            await applyData(stores, man.ls || {});
            changed = true; syncedHeavy = heavy.map(h => h.name);
          }
          lastPulledAt = man.updatedAt; cfgSet('lastPulledAt', man.updatedAt);
          conflict = false; setStatus('Sincronizado'); ok = true; lastError = '';
        }
      }
    } catch (e) { console.warn(e); lastError = e.message; setStatus('Erro: ' + e.message); toast('Sincronização: ' + e.message, 'error'); }
    finally { busy = false; renderPanel(); }
    if (changed) { toast('Dados atualizados da nuvem ✅', 'success'); refreshApp(); }
    return ok;
  }

  /* ---------- Enviar (push) ---------- */
  async function doPush(forceOverwrite) {
    if (!enabled || !TOKEN || !OWNER || !REPO || applying || busy || !dbReady()) return;
    busy = true; pendingPush = false; setStatus('Enviando…'); renderPanel();
    try {
      await ensureBranch();
      let head = await ghGetRef();
      if (!head) { await ghEnsureRepo(); head = await ghGetRef(); }
      if (!head) throw new Error('Repositório sem branch principal');
      const map = await ghGetTreeMap(head);

      if (!forceOverwrite && map.files[MANIFEST]) {
        try {
          const r = JSON.parse(await ghReadBlobText(map.files[MANIFEST]));
          if (r.updatedAt && lastPulledAt && r.updatedAt > lastPulledAt && r.device !== DEVICE) {
            conflict = true; setStatus('Conflito detectado');
            toast('A nuvem tem alterações de outro aparelho. Resolva o conflito.', 'error'); return;
          }
        } catch (e) {}
      }

      const collected = await collectStores();
      const ls = collectLS();
      const updatedAt = new Date().toISOString();
      const heavyMeta = []; const files = []; let total = 0;
      for (const name in collected.heavy) {
        const parts = chunkStoreBytes(collected.heavy[name]);
        heavyMeta.push({ name: name, parts: parts.length });
        parts.forEach((bytes, idx) => {
          total += bytes.length;
          files.push({ path: STORE_DIR + name + '.part' + idx + '.json', bytes: bytes });
        });
      }
      const manifest = { v: 2, app: 'lexora', updatedAt: updatedAt, device: DEVICE, stores: collected.light, ls: ls, heavy: heavyMeta };
      const manBytes = strToBytes(JSON.stringify(manifest)); total += manBytes.length;
      files.push({ path: MANIFEST, bytes: manBytes });
      lastSize = total;
      console.log('[sync] enviando ' + (total / 1048576).toFixed(2) + ' MB em ' + files.length + ' arquivo(s)');

      await ghCommitFiles(files, head, map.files || {});

      lastPushedAt = updatedAt; lastPulledAt = updatedAt;
      cfgSet('lastPushedAt', updatedAt); cfgSet('lastPulledAt', updatedAt);
      syncedHeavy = heavyMeta.map(h => h.name);
      dirty = false; conflict = false; lastError = ''; setStatus('Sincronizado');
    } catch (e) {
      console.warn(e); lastError = e.message; setStatus('Erro: ' + e.message);
      toast('Falha ao enviar: ' + e.message, 'error'); pendingPush = true;
    } finally {
      busy = false; renderPanel();
      if (pendingPush && enabled && !conflict) { pendingPush = false; clearTimeout(pushTimer); pushTimer = setTimeout(() => doPush(false), PUSH_DELAY); }
    }
  }

  async function syncNow() { await doPull(false); if (!conflict) await doPush(false); }

  function markDirty() {
    if (!enabled || applying || !booted) return;
    dirty = true; setStatus('Alterações pendentes…');
    if (busy) { pendingPush = true; return; }
    clearTimeout(pushTimer); pushTimer = setTimeout(() => doPush(false), PUSH_DELAY);
  }

  /* ---------- Conectar / pausar / esquecer ---------- */
  async function connect(token) {
    if (!token) { toast('Cole o token', 'error'); return; }
    if (!dbReady()) { toast('Aguarde o app carregar e tente de novo', 'error'); return; }
    busy = true; setStatus('Conectando…'); renderPanel();
    try {
      TOKEN = token.trim(); cfgSet('token', TOKEN);
      setStatus('Identificando conta…'); renderPanel();
      OWNER = await ghWhoAmI(); cfgSet('owner', OWNER);
      REPO = cfgGet('repo') || REPO_DEFAULT; cfgSet('repo', REPO);
      setStatus('Preparando repositório…'); renderPanel();
      await ghEnsureRepo();
      const head = await ghGetRef();
      let hasRemote = false;
      if (head) { const map = await ghGetTreeMap(head); hasRemote = !!map.files[MANIFEST]; }
      enabled = true; cfgSet('enabled', '1'); busy = false;
      if (hasRemote) { await doPull(true); }
      else { await doPush(true); }
      setStatus('Sincronizado'); toast('Sincronização ativada ✅', 'success'); renderPanel();
    } catch (e) { busy = false; console.warn(e); setStatus('Erro: ' + e.message); toast('Falha: ' + e.message, 'error'); renderPanel(); }
  }
  function disconnect() { enabled = false; cfgSet('enabled', '0'); setStatus('Pausada'); toast('Sincronização pausada'); renderPanel(); }
  function forget() {
    enabled = false;
    ['token', 'owner', 'repo', 'enabled', 'lastPulledAt', 'lastPushedAt'].forEach(cfgDel);
    TOKEN = null; OWNER = null; REPO = null; lastPulledAt = null; lastPushedAt = null; branchResolved = false;
    setStatus('Não configurado'); toast('Credenciais removidas deste aparelho'); renderPanel();
  }

  /* ---------- Interface (estilo Lexora) ---------- */
  function fmtWhen(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleString('pt-BR'); } catch (e) { return iso; } }
  const BTN = 'width:100%;border:none;border-radius:11px;padding:12px;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;';

  function errHtml() {
    let h = '';
    if (lastError) h += '<div style="background:var(--red-bg);border:1px solid rgba(178,58,58,.25);color:var(--red);border-radius:9px;padding:10px 12px;margin-top:12px;font-size:12.5px;"><strong>Último erro:</strong> ' + String(lastError).replace(/</g, '&lt;') + '</div>';
    h += '<div id="sync-diag-out" style="font-size:12px;color:var(--text-2);margin-top:8px;white-space:pre-line;"></div>';
    h += '<button type="button" id="sync-diag-btn" style="background:none;border:none;color:var(--brass-deep);font-size:12.5px;font-weight:600;cursor:pointer;padding:6px 0 0;font-family:inherit;">Testar conexão / diagnóstico</button>';
    return h;
  }
  async function runDiag() {
    const out = document.getElementById('sync-diag-out');
    const log = (m) => { if (out) out.textContent += m + '\n'; };
    if (out) out.textContent = '';
    log('Banco de dados pronto: ' + (dbReady() ? 'sim' : 'NÃO'));
    log('Login concluído: ' + (loginDone() ? 'sim' : 'não'));
    log('Token informado: ' + (TOKEN ? 'sim' : 'NÃO'));
    log('Testando alcance do GitHub (sem token)…');
    try { const r0 = await fetch('https://api.github.com/zen', { cache: 'no-store' }); log('GitHub alcançável: sim (' + r0.status + ')'); }
    catch (e0) { log('GitHub BLOQUEADO pelo navegador/rede: ' + e0.message); log('→ Tente numa janela anônima (sem extensões) ou em outra rede / dados móveis.'); return; }
    if (!TOKEN) { log('→ Cole o token e conecte primeiro.'); return; }
    log('Testando conta e permissão (escopo repo)…');
    try { const who = await ghWhoAmI(); OWNER = OWNER || who; log('Conta: ' + who + ' ✓'); }
    catch (e) { log('Falha: ' + e.message); return; }
    REPO = REPO || cfgGet('repo') || REPO_DEFAULT;
    try { const head = await ghGetRef(); log('Repositório "' + REPO + '": ' + (head ? 'pronto ✓' : 'ainda não criado (será criado ao conectar)')); }
    catch (e) { log('Repositório: ' + e.message); }
    try {
      if (dbReady()) {
        const sizes = []; let total = 0;
        for (const s of storeNames()) { try { const recs = await readAll(s); const safe = await serializeRecs(recs); const sz = JSON.stringify(safe).length; sizes.push([s, sz]); total += sz; } catch (e) {} }
        sizes.sort((x, y) => y[1] - x[1]);
        log('Tamanho total: ' + (total / 1048576).toFixed(2) + ' MB');
        log('Maiores categorias:');
        sizes.slice(0, 6).forEach(([s, sz]) => { if (sz > 1024) log('  • ' + s + ': ' + (sz / 1048576).toFixed(2) + ' MB' + (sz > LIGHT_STORE_LIMIT ? ' → arquivo próprio' : '')); });
      }
    } catch (e) { log('Erro ao medir dados: ' + e.message); }
    log('Otimização de envio (SHA local): ' + ((window.crypto && crypto.subtle) ? 'disponível' : 'indisponível neste contexto'));
  }

  function renderPanel() {
    const host = document.getElementById('sync-panel');
    if (!host) return;
    const on = (id, fn) => { const e = document.getElementById(id); if (e) e.onclick = fn; };
    if (!enabled) {
      host.innerHTML =
        '<div class="set-card">'
        + '<h3>☁️ Sincronização na nuvem</h3>'
        + '<p class="desc" style="font-size:13px;color:var(--text-2);margin-bottom:14px;">Mantém seus dados iguais em todos os aparelhos usando um <strong>repositório privado do GitHub</strong> (grátis), inclusive anexos e logos. Baixa ao abrir e envia automaticamente a cada alteração.</p>'
        + '<ol style="font-size:13px;color:var(--text-2);padding-left:18px;line-height:1.7;margin:0 0 12px;">'
        + '<li>Tenha uma conta no <strong>github.com</strong>.</li>'
        + '<li>Abra <a href="https://github.com/settings/tokens/new?scopes=repo&description=Lexora" target="_blank" rel="noopener" style="color:var(--brass-deep);font-weight:600;">este link</a> para gerar um <strong>token</strong> (escopo <em>repo</em> já marcado) e clique em <em>Generate token</em>.</li>'
        + '<li>Copie o token (começa com <code>ghp_</code>) e cole abaixo.</li>'
        + '<li>Nos <strong>outros aparelhos</strong>, cole o <strong>mesmo token</strong>.</li>'
        + '</ol>'
        + '<input type="password" id="sync-token" placeholder="ghp_..." autocomplete="off" style="width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface-2);font-family:monospace;font-size:13.5px;outline:none;margin-bottom:10px;">'
        + '<button type="button" id="sync-connect-btn" class="btn btn-primary" style="' + BTN + '">Conectar e sincronizar</button>'
        + '<div style="background:var(--amber-bg);border:1px solid rgba(192,138,42,.3);color:#8a6420;border-radius:9px;padding:10px 12px;margin-top:12px;font-size:12.5px;">⚠️ Ao conectar a uma sincronização que já existe, os dados da nuvem <strong>substituem</strong> os locais. Conecte primeiro o aparelho com os dados certos. Um repositório privado <code>' + REPO_DEFAULT + '</code> será criado automaticamente.</div>'
        + errHtml()
        + '</div>';
      on('sync-connect-btn', () => connect((document.getElementById('sync-token') || {}).value || ''));
      on('sync-diag-btn', runDiag);
      const ti = document.getElementById('sync-token');
      if (ti) ti.onkeydown = (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); connect(ti.value || ''); } };
      return;
    }
    host.innerHTML =
      '<div class="set-card">'
      + '<h3>☁️ Sincronização na nuvem</h3>'
      + (conflict
        ? '<div style="background:var(--red-bg);border:1px solid rgba(178,58,58,.25);color:var(--red);border-radius:9px;padding:11px 12px;font-size:13px;margin:6px 0 12px;"><strong>⚠️ Conflito.</strong> A nuvem foi alterada por outro aparelho depois da sua última sincronização. Escolha qual versão vale:'
          + '<div style="display:flex;gap:8px;margin-top:8px;"><button type="button" id="sync-resolve-pull" class="btn btn-primary" style="flex:1;justify-content:center;">Usar a da nuvem</button><button type="button" id="sync-resolve-push" class="btn btn-ghost" style="flex:1;justify-content:center;color:var(--red);">Usar a deste aparelho</button></div></div>'
        : '')
      + '<div style="display:flex;justify-content:space-between;align-items:center;background:var(--surface-2);border:1px solid var(--line-2);border-radius:10px;padding:11px 14px;margin:6px 0 14px;">'
      + '<div><div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;">Status</div><div id="sync-status" style="font-weight:700;color:var(--ink);">' + statusText + '</div></div>'
      + '<div style="text-align:right;"><div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;">Último envio</div><div style="font-weight:600;font-size:13px;color:var(--ink);">' + fmtWhen(lastPushedAt) + '</div></div>'
      + '</div>'
      + ((OWNER && REPO) ? '<div style="font-size:12.5px;color:var(--text-2);margin-bottom:12px;">Repositório: <code>' + OWNER + '/' + REPO + '</code> (privado)</div>' : '')
      + '<button type="button" id="sync-now-btn" class="btn btn-primary" style="' + BTN + '"' + (busy ? ' disabled' : '') + '>Sincronizar agora</button>'
      + '<p class="desc" style="font-size:12.5px;color:var(--text-2);margin:10px 0 0;">Envio automático e imediato a cada alteração, e baixa automática ao abrir o app ou voltar para ele. Resolução por "último a salvar vence".</p>'
      + (syncedHeavy && syncedHeavy.length ? '<div style="background:var(--green-bg);border:1px solid rgba(63,125,84,.3);color:var(--green);border-radius:9px;padding:10px 12px;margin-top:10px;font-size:12.5px;">Arquivos grandes sincronizando (' + syncedHeavy.join(', ') + ') — anexos e logos vão para a nuvem junto com o resto.</div>' : '')
      + '<div style="display:flex;gap:8px;margin-top:14px;">'
      + '<button type="button" id="sync-pause-btn" class="btn btn-ghost" style="flex:1;justify-content:center;">Pausar</button>'
      + '<button type="button" id="sync-forget-btn" class="btn btn-ghost" style="flex:1;justify-content:center;color:var(--red);">Remover token</button>'
      + '</div>'
      + errHtml()
      + '</div>';
    on('sync-now-btn', syncNow);
    on('sync-pause-btn', disconnect);
    on('sync-forget-btn', forget);
    on('sync-diag-btn', runDiag);
    on('sync-resolve-pull', async () => { conflict = false; await doPull(true); });
    on('sync-resolve-push', async () => { conflict = false; await doPush(true); });
  }

  // Monta o painel na página de Configurações (id 'config')
  let _mountDebounce = null;
  function mountPanel() {
    const onConfig = (typeof current !== 'undefined' && current === 'config');
    if (!onConfig) return;
    const content = document.getElementById('content'); if (!content) return;
    // Se o painel já existe, apenas re-renderiza (sem recriar)
    if (document.getElementById('sync-panel')) { renderPanel(); return; }
    // Só insere depois que o .view estiver presente (página carregada)
    const view = content.querySelector('.view');
    if (!view) return;
    const wrap = document.createElement('div'); wrap.id = 'sync-panel'; wrap.style.maxWidth = '820px';
    view.appendChild(wrap);
    renderPanel();
  }
  function mountPanelDebounced() {
    clearTimeout(_mountDebounce);
    _mountDebounce = setTimeout(() => { try { mountPanel(); } catch (e) {} }, 120);
  }

  /* ---------- Boot ---------- */
  let _booting = false;
  async function tryBoot() {
    if (booted || _booting) return;
    if (!dbReady() || !loginDone()) return;
    _booting = true;
    loadCfg();
    const content = document.getElementById('content');
    if (content) { const obs = new MutationObserver(() => { try { mountPanelDebounced(); } catch (e) {} }); obs.observe(content, { childList: true, subtree: false }); }
    mountPanel();
    setStatus(enabled ? 'Sincronizado' : (TOKEN ? 'Pausada' : 'Não configurado'));
    booted = true;
    if (enabled && TOKEN && OWNER && REPO) { await doPull(false); }
  }
  const _bootTimer = setInterval(() => { tryBoot().catch(e => console.warn('sync boot', e)); if (booted) clearInterval(_bootTimer); }, 800);

  document.addEventListener('visibilitychange', () => {
    if (!enabled || !booted) return;
    if (document.hidden) { if (dirty && !busy) doPush(false); }
    else if (!busy) doPull(false);
  });
  setInterval(() => { if (enabled && booted && !document.hidden && !busy && !dirty) doPull(false); }, 180000);

})();
</script>

</body>
</html>
