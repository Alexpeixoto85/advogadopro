<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexora — Gestão Jurídica</title>
<script>
/* ============================================================
   PROTEÇÃO DE CÓDIGO-FONTE — Lexora
   ============================================================ */
(function(){
  // 1. Bloqueia clique direito
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); return false; }, true);

  // 2. Bloqueia seleção de texto em todo o documento
  document.addEventListener('selectstart', function(e){ e.preventDefault(); return false; }, true);

  // 3. Bloqueia cópia, corte e colagem
  document.addEventListener('copy',  function(e){ e.preventDefault(); return false; }, true);
  document.addEventListener('cut',   function(e){ e.preventDefault(); return false; }, true);

  // 4. Bloqueia atalhos de teclado perigosos
  document.addEventListener('keydown', function(e){
    var k = e.key ? e.key.toLowerCase() : '';
    var ctrl = e.ctrlKey || e.metaKey;

    // F12 — DevTools
    if(e.keyCode === 123){ e.preventDefault(); return false; }
    // Ctrl+U — Ver código-fonte
    if(ctrl && k === 'u'){ e.preventDefault(); return false; }
    // Ctrl+S — Salvar página
    if(ctrl && k === 's'){ e.preventDefault(); return false; }
    // Ctrl+Shift+I — DevTools (Elements)
    if(ctrl && e.shiftKey && k === 'i'){ e.preventDefault(); return false; }
    // Ctrl+Shift+J — DevTools (Console)
    if(ctrl && e.shiftKey && k === 'j'){ e.preventDefault(); return false; }
    // Ctrl+Shift+C — DevTools (Inspector)
    if(ctrl && e.shiftKey && k === 'c'){ e.preventDefault(); return false; }
    // Ctrl+Shift+K — Console (Firefox)
    if(ctrl && e.shiftKey && k === 'k'){ e.preventDefault(); return false; }
    // Ctrl+A — Selecionar tudo
    if(ctrl && k === 'a'){ e.preventDefault(); return false; }
    // Ctrl+C — Copiar
    if(ctrl && k === 'c'){ e.preventDefault(); return false; }
    // Ctrl+P — Imprimir (evita ver o HTML pelo print)
    if(ctrl && k === 'p'){ e.preventDefault(); return false; }
  }, true);

  // 5. (Removido) Detecção de DevTools por tamanho de janela.
  //    A heurística disparava falsos positivos (zoom, painel acoplado, modo
  //    responsivo) e substituía todo o body, removendo os elementos da página.
  //    Como o relógio e outras rotinas continuavam rodando e tentavam acessar
  //    esses elementos já inexistentes, gerava o erro recorrente:
  //    "Cannot set properties of null (setting 'textContent')".

  // 6. CSS: desabilita seleção de texto via CSS
  var style = document.createElement('style');
  style.textContent = '* { -webkit-user-select: none !important; -moz-user-select: none !important; -ms-user-select: none !important; user-select: none !important; } input, textarea, select { -webkit-user-select: text !important; -moz-user-select: text !important; user-select: text !important; }';
  document.head.appendChild(style);
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16243f;
  --ink-soft:#22324f;
  --ink-line:#2e4063;
  --parch:#f4f0e8;
  --parch-2:#efe9dd;
  --surface:#ffffff;
  --surface-2:#fbf9f4;
  --brass:#b08332;
  --brass-deep:#8a6420;
  --brass-soft:#e9d9b6;
  --text:#1f2733;
  --text-2:#5d6573;
  --text-3:#8b919c;
  --line:#e3ddd0;
  --line-2:#ece6da;
  --green:#3f7d54;
  --green-bg:#e6f0e8;
  --red:#b23a3a;
  --red-bg:#f6e3e1;
  --amber:#c08a2a;
  --amber-bg:#f7eed6;
  --blue:#3a5a9b;
  --blue-bg:#e5ebf6;
  --radius:14px;
  --radius-sm:9px;
  --shadow:0 1px 2px rgba(22,36,63,.04),0 8px 24px rgba(22,36,63,.06);
  --shadow-lg:0 18px 50px rgba(22,36,63,.22);
  --sans:'Public Sans',system-ui,sans-serif;
  --serif:'Fraunces',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--parch);color:var(--text);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
@media(max-width:820px){body{overflow:auto}}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cfc8b8;border-radius:10px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-track{background:transparent}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:inherit}

/* ===== App shell ===== */
.app{display:flex;height:100vh;width:100%;position:relative;z-index:1}
/* camada de plano de fundo do sistema (imagem) */
#bgOverlay{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;pointer-events:none}
/* quando há imagem de fundo, a área principal fica transparente para revelá-la */
body.has-bg .main{background:transparent}
body.has-bg .content{background:transparent}

/* ===== Sidebar ===== */
.sidebar{
  width:262px;flex-shrink:0;background:var(--ink);color:#cdd6e6;
  display:flex;flex-direction:column;position:relative;z-index:60;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.brand{padding:24px 22px 20px;border-bottom:1px solid var(--ink-line)}
.brand-mark{display:flex;align-items:center;gap:12px}
.brand-logo{
  width:40px;height:40px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(150deg,var(--brass),var(--brass-deep));
  display:grid;place-items:center;box-shadow:0 4px 14px rgba(176,131,50,.35);
}
.brand-logo svg{width:22px;height:22px}
.brand-name{font-family:var(--serif);font-size:22px;font-weight:600;color:#fff;letter-spacing:.3px;line-height:1}
.brand-sub{font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--brass-soft);margin-top:3px}

.nav{flex:1;overflow-y:auto;padding:14px 12px 8px}
.nav-label{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:#73809a;padding:14px 12px 7px;font-weight:600}
.nav-item{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  padding:10px 13px;border-radius:10px;color:#b7c1d4;font-size:14px;font-weight:500;
  transition:background .15s,color .15s;position:relative;margin-bottom:2px;
}
.nav-item svg{width:18.5px;height:18.5px;flex-shrink:0;opacity:.85}
.nav-item:hover{background:var(--ink-soft);color:#fff}
.nav-item.active{background:linear-gradient(100deg,var(--ink-soft),rgba(176,131,50,.16));color:#fff}
.nav-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--brass)}
.nav-item.active svg{opacity:1;color:var(--brass-soft)}
.nav-badge{margin-left:auto;background:var(--brass);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:grid;place-items:center;padding:0 6px}
.sidebar-foot{padding:14px 16px;border-top:1px solid var(--ink-line);font-size:11.5px;color:#73809a;display:flex;align-items:center;gap:8px}
.sidebar-foot .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(63,125,84,.2)}

/* ===== Main ===== */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--parch)}
.topbar{
  height:68px;flex-shrink:0;display:flex;align-items:center;gap:16px;
  padding:0 28px;background:rgba(244,240,232,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40;
}
.hamburger{display:none;width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--surface);place-items:center}
.hamburger svg{width:20px;height:20px}
.page-head{flex:1 1 0;min-width:0;overflow:hidden}
.page-head h1{font-family:var(--serif);font-size:25px;font-weight:600;color:var(--ink);line-height:1.15;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-head p{font-size:12.5px;color:var(--text-2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-search{
  flex-shrink:0;display:flex;align-items:center;gap:9px;background:var(--surface);
  border:1px solid var(--line);border-radius:11px;padding:9px 14px;width:280px;transition:border .15s,box-shadow .15s;
}
.topbar-search:focus-within{border-color:var(--brass);box-shadow:0 0 0 3px rgba(176,131,50,.12)}
.topbar-search svg{width:17px;height:17px;color:var(--text-3);flex-shrink:0}
.topbar-search input{border:none;outline:none;background:none;width:100%;font-size:14px}
.topbar-date{flex-shrink:0;font-size:12.5px;color:var(--text-2);text-align:right;line-height:1.3;white-space:nowrap}
.topbar-date b{display:block;color:var(--ink);font-size:13px;text-transform:capitalize}

.content{flex:1;overflow-y:auto;padding:28px;scroll-behavior:smooth}
.view{display:none;animation:fade .35s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== Cards / KPI ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;right:-30px;top:-30px;width:110px;height:110px;border-radius:50%;background:var(--surface-2);z-index:0}
.kpi-ico{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;position:relative;z-index:1}
.kpi-ico svg{width:21px;height:21px}
.kpi-ico.b1{background:var(--blue-bg);color:var(--blue)}
.kpi-ico.b2{background:var(--amber-bg);color:var(--amber)}
.kpi-ico.b3{background:var(--green-bg);color:var(--green)}
.kpi-ico.b4{background:var(--red-bg);color:var(--red)}
.kpi-val{font-family:var(--serif);font-size:30px;font-weight:600;color:var(--ink);margin-top:14px;line-height:1;position:relative;z-index:1}
.kpi-lbl{font-size:12.5px;color:var(--text-2);margin-top:6px;position:relative;z-index:1}
.kpi.clickable{cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
.kpi.clickable:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(22,36,63,.14);border-color:var(--brass)}
.kpi.clickable:active{transform:translateY(-1px)}

.dash-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--line-2)}
.panel-head h3{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink)}
.panel-head .link{font-size:12.5px;color:var(--brass-deep);font-weight:600}
.panel-body{padding:8px 10px 12px}

/* timeline list */
.tl-item{display:flex;gap:13px;padding:12px 12px;border-radius:10px;transition:background .15s;cursor:default}
.tl-item:hover{background:var(--surface-2)}
.tl-mark{width:38px;flex-shrink:0;text-align:center}
.tl-day{font-family:var(--serif);font-size:19px;font-weight:600;color:var(--ink);line-height:1}
.tl-mon{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3)}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}
.tl-meta{font-size:12px;color:var(--text-2);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tl-bar{width:3px;border-radius:3px;flex-shrink:0}

/* ===== Toolbar / table ===== */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 14px;flex:1;min-width:200px;max-width:360px;transition:border .15s,box-shadow .15s}
.search-box:focus-within{border-color:var(--brass);box-shadow:0 0 0 3px rgba(176,131,50,.12)}
.search-box svg{width:17px;height:17px;color:var(--text-3)}
.search-box input{border:none;outline:none;background:none;width:100%}
.filter-sel{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 13px;color:var(--text);outline:none;cursor:pointer;transition:border .15s}
.filter-sel:focus{border-color:var(--brass)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 17px;border-radius:11px;font-size:14px;font-weight:600;transition:transform .12s,box-shadow .15s,background .15s,border-color .15s;white-space:nowrap}
.btn svg{width:17px;height:17px}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(150deg,var(--brass),var(--brass-deep));color:#fff;box-shadow:0 4px 14px rgba(176,131,50,.3)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(176,131,50,.4)}
.btn-ghost{background:var(--surface);border:1px solid var(--line);color:var(--text)}
.btn-ghost:hover{border-color:var(--brass);color:var(--brass-deep)}
.btn-ink{background:var(--ink);color:#fff}
.btn-ink:hover{background:var(--ink-soft)}
.btn-sm{padding:7px 12px;font-size:13px}
.ml-auto{margin-left:auto}

.table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:640px}
thead th{text-align:left;font-size:11px;letter-spacing:.7px;text-transform:uppercase;color:var(--text-3);font-weight:700;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--surface-2);white-space:nowrap}
tbody td{padding:14px 18px;border-bottom:1px solid var(--line-2);font-size:14px;vertical-align:middle}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--surface-2)}
tbody tr:last-child td{border-bottom:none}
.cell-strong{font-weight:600;color:var(--ink)}
.cell-sub{font-size:12px;color:var(--text-2);margin-top:1px}
.cell-mono{font-family:'SF Mono',ui-monospace,monospace;font-size:12.5px;color:var(--text-2)}

.avatar{width:36px;height:36px;border-radius:10px;background:var(--ink);color:var(--brass-soft);display:grid;place-items:center;font-family:var(--serif);font-weight:600;font-size:14px;flex-shrink:0}
.avatar.pj{background:var(--brass-deep);color:#fff;border-radius:8px}
.with-av{display:flex;align-items:center;gap:12px}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.badge .bdot{width:6px;height:6px;border-radius:50%}
.bg-green{background:var(--green-bg);color:var(--green)}.bg-green .bdot{background:var(--green)}
.bg-red{background:var(--red-bg);color:var(--red)}.bg-red .bdot{background:var(--red)}
.bg-amber{background:var(--amber-bg);color:var(--amber)}.bg-amber .bdot{background:var(--amber)}
.bg-blue{background:var(--blue-bg);color:var(--blue)}.bg-blue .bdot{background:var(--blue)}
.bg-gray{background:var(--parch-2);color:var(--text-2)}.bg-gray .bdot{background:var(--text-3)}

.row-actions{display:flex;gap:6px;justify-content:flex-end}
.icon-btn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--text-2);transition:background .15s,color .15s;border:1px solid transparent}
.icon-btn svg{width:17px;height:17px}
.icon-btn:hover{background:var(--surface-2);color:var(--ink);border-color:var(--line)}
.icon-btn.danger:hover{background:var(--red-bg);color:var(--red);border-color:transparent}

.empty{text-align:center;padding:48px 20px;color:var(--text-2)}
.empty-ico{width:52px;height:52px;border-radius:16px;background:var(--parch-2);display:grid;place-items:center;margin:0 auto 14px}
.empty-ico svg{width:26px;height:26px;color:var(--text-3)}
.empty h3{font-family:var(--serif);font-size:19px;color:var(--ink);margin-bottom:6px}
.empty p{font-size:13.5px;max-width:340px;margin:0 auto 18px}

/* ===== Modal ===== */
.overlay{position:fixed;inset:0;background:rgba(22,36,63,.5);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 18px;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:600px;animation:pop .3s cubic-bezier(.2,.8,.3,1);margin:auto 0}
.modal.wide{max-width:720px}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;padding:24px 26px 18px;border-bottom:1px solid var(--line-2)}
.modal-head h2{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--ink)}
.modal-head p{font-size:13px;color:var(--text-2);margin-top:2px}
.modal-close{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--text-2);transition:background .15s}
.modal-close:hover{background:var(--parch-2)}
.modal-close svg{width:20px;height:20px}
.modal-body{padding:22px 26px;max-height:62vh;overflow-y:auto}
.modal-foot{padding:18px 26px;border-top:1px solid var(--line-2);display:flex;gap:12px;justify-content:flex-end}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.col-2{grid-column:span 2}
.field label{font-size:12.5px;font-weight:600;color:var(--text)}
.field label .req{color:var(--red)}
.field input,.field select,.field textarea{
  padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);
  outline:none;transition:border .15s,box-shadow .15s,background .15s;color:var(--text);width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brass);box-shadow:0 0 0 3px rgba(176,131,50,.12);background:var(--surface)}
.field textarea{resize:vertical;min-height:78px}
.field .hint{font-size:11.5px;color:var(--text-3)}
.seg{display:flex;gap:8px}
.seg label{flex:1;cursor:pointer}
.seg input{display:none}
.seg-btn{display:block;text-align:center;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:13.5px;font-weight:600;color:var(--text-2);transition:all .15s;background:var(--surface-2)}
.seg input:checked+.seg-btn{border-color:var(--brass);background:var(--amber-bg);color:var(--brass-deep)}

/* ===== Detail drawer ===== */
.detail-section{margin-bottom:22px}
.detail-section h4{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-3);font-weight:700;margin-bottom:10px}
.detail-row{display:flex;justify-content:space-between;gap:16px;padding:9px 0;border-bottom:1px dashed var(--line-2);font-size:14px}
.detail-row:last-child{border-bottom:none}
.detail-row .dk{color:var(--text-2)}
.detail-row .dv{font-weight:600;color:var(--ink);text-align:right}

/* ===== Toast ===== */
.toast-wrap{position:fixed;bottom:26px;right:26px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--ink);color:#fff;padding:14px 18px;border-radius:12px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:11px;font-size:14px;font-weight:500;animation:slideIn .3s cubic-bezier(.2,.8,.3,1);max-width:340px}
.toast svg{width:19px;height:19px;flex-shrink:0}
.toast.ok svg{color:#7ddb9a}
.toast.warn svg{color:#f2c25b}
.toast.err svg{color:#f08a82}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}

/* finance summary */
.fin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:24px}
.fin-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.fin-card .lbl{font-size:12.5px;color:var(--text-2);display:flex;align-items:center;gap:8px}
.fin-card .lbl .ico{width:30px;height:30px;border-radius:9px;display:grid;place-items:center}
.fin-card .ico svg{width:16px;height:16px}
.fin-card .val{font-family:var(--serif);font-size:28px;font-weight:600;margin-top:12px;line-height:1}
.fin-card.in .val{color:var(--green)}.fin-card.in .ico{background:var(--green-bg);color:var(--green)}
.fin-card.out .val{color:var(--red)}.fin-card.out .ico{background:var(--red-bg);color:var(--red)}
.fin-card.bal .val{color:var(--ink)}.fin-card.bal .ico{background:var(--blue-bg);color:var(--blue)}
.fin-card.clickable{cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
.fin-card.clickable:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(22,36,63,.14);border-color:var(--brass)}
.fin-card.clickable:active{transform:translateY(-1px)}
.fin-card.clickable.active-filter{border-color:var(--brass);box-shadow:0 0 0 2px var(--brass-soft) inset}

/* kanban */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.kcol{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);min-height:200px}
.kcol-head{padding:15px 17px;display:flex;align-items:center;gap:9px;font-weight:700;font-size:13.5px;border-bottom:1px solid var(--line-2)}
.kcol-head .kdot{width:9px;height:9px;border-radius:50%}
.kcol-head .kcount{margin-left:auto;background:var(--parch-2);color:var(--text-2);font-size:12px;font-weight:700;padding:2px 9px;border-radius:10px}
.kcol-body{padding:12px;display:flex;flex-direction:column;gap:10px}
.kcard{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:14px;box-shadow:var(--shadow);cursor:grab;transition:box-shadow .15s,transform .12s}
.kcard:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.kcard.dragging{opacity:.5}
.kcard-title{font-weight:600;color:var(--ink);font-size:14px;margin-bottom:7px}
.kcard-desc{font-size:12.5px;color:var(--text-2);margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.kcard-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.kcol.drop-hover{outline:2px dashed var(--brass);outline-offset:-4px}

.section-title{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink);margin:4px 0 16px}

/* settings */
.set-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:18px}
.set-card h3{font-family:var(--serif);font-size:18px;color:var(--ink);margin-bottom:4px}
.set-card .desc{font-size:13px;color:var(--text-2);margin-bottom:18px}
.backdrop-blur{display:none}

/* responsive */
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.dash-grid{grid-template-columns:1fr}.fin-grid{grid-template-columns:1fr}.kanban{grid-template-columns:1fr}.doc-type-tabs{grid-template-columns:repeat(2,1fr)}}
@media(max-width:820px){.sidebar{position:fixed;top:0;bottom:0;left:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .backdrop-blur.show{display:block;position:fixed;inset:0;background:rgba(22,36,63,.4);z-index:55}
  .hamburger{display:grid}
  .topbar-search{display:none}
  .content{padding:18px}
  .form-grid{grid-template-columns:1fr}
  .field.col-2{grid-column:span 1}
  .topbar{padding:0 16px;gap:10px}
  .page-head h1{font-size:21px}
  .topbar-date{display:none}
  .doc-type-tabs{grid-template-columns:1fr 1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .fin-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:520px){.kpi-grid{grid-template-columns:1fr}.fin-grid{grid-template-columns:1fr}}

/* ===== Auth screen ===== */
#authScreen{position:fixed;inset:0;background:var(--ink);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.auth-box{background:var(--surface);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.4);width:100%;max-width:400px;overflow:hidden;animation:pop .35s cubic-bezier(.2,.8,.3,1);margin:auto}
.auth-header{background:linear-gradient(150deg,var(--ink),var(--ink-soft));padding:20px 28px 16px;text-align:center;display:flex;align-items:center;gap:14px}
.auth-logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(150deg,var(--brass),var(--brass-deep));display:grid;place-items:center;flex-shrink:0;box-shadow:0 4px 14px rgba(176,131,50,.4)}
.auth-logo svg{width:22px;height:22px}
.auth-header-text{text-align:left}
.auth-header h1{font-family:var(--serif);font-size:22px;font-weight:600;color:#fff;letter-spacing:.3px;line-height:1}
.auth-header p{font-size:11px;color:var(--brass-soft);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.auth-tabs{display:flex;border-bottom:1px solid var(--line)}
.auth-tab{flex:1;padding:11px;font-size:13.5px;font-weight:600;color:var(--text-2);cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-left:none;border-right:none;border-top:none}
.auth-tab.active{color:var(--brass-deep);border-bottom-color:var(--brass)}
.auth-body{padding:18px 24px 22px}
.auth-field{margin-bottom:11px}
.auth-field label{font-size:12px;font-weight:600;color:var(--text);display:block;margin-bottom:4px}
.auth-field input{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface-2);font-size:13.5px;outline:none;transition:border .15s,box-shadow .15s;font-family:inherit}
.auth-field input:focus{border-color:var(--brass);box-shadow:0 0 0 3px rgba(176,131,50,.12);background:var(--surface)}
.auth-btn{width:100%;padding:11px;background:linear-gradient(150deg,var(--brass),var(--brass-deep));color:#fff;border-radius:10px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:box-shadow .15s,transform .12s;box-shadow:0 4px 14px rgba(176,131,50,.3);margin-top:4px}
.auth-btn:hover{box-shadow:0 6px 20px rgba(176,131,50,.45);transform:translateY(-1px)}
.auth-btn:active{transform:translateY(0)}
.auth-err{background:var(--red-bg);color:var(--red);border-radius:8px;padding:8px 12px;font-size:12.5px;font-weight:600;margin-bottom:10px;display:none}
.auth-err.show{display:block}
.auth-role{display:flex;gap:6px;margin-bottom:11px}
.auth-role label{flex:1;cursor:pointer}
.auth-role input{display:none}
.auth-role-btn{display:block;text-align:center;padding:8px 4px;border:1px solid var(--line);border-radius:8px;font-size:12px;font-weight:600;color:var(--text-2);transition:all .15s;background:var(--surface-2)}
.auth-role input:checked+.auth-role-btn{border-color:var(--brass);background:var(--amber-bg);color:var(--brass-deep)}
/* User info in topbar */
.user-chip{flex-shrink:0;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:7px 13px;cursor:pointer;transition:border .15s;position:relative}
.user-chip:hover{border-color:var(--brass)}
.user-chip .uc-av{width:28px;height:28px;border-radius:8px;background:var(--ink);color:var(--brass-soft);display:grid;place-items:center;font-family:var(--serif);font-size:12px;font-weight:700;flex-shrink:0}
.user-chip .uc-name{font-size:13px;font-weight:600;color:var(--ink);max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-chip .uc-role{font-size:11px;color:var(--text-2);max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:820px){.user-chip .uc-name,.user-chip .uc-role{max-width:80px}.user-chip>div:not(.uc-av){display:none}}
.user-menu{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);min-width:190px;z-index:200;overflow:hidden;display:none}
.user-chip:hover .user-menu,.user-chip.open .user-menu{display:block}
.user-menu-item{display:flex;align-items:center;gap:10px;padding:11px 15px;font-size:13.5px;font-weight:500;color:var(--text);cursor:pointer;transition:background .12s;border:none;background:none;width:100%;text-align:left}
.user-menu-item svg{width:16px;height:16px;color:var(--text-3)}
.user-menu-item:hover{background:var(--surface-2)}
.user-menu-item.danger{color:var(--red)}
.user-menu-item.danger svg{color:var(--red)}
/* Logs view */
.log-entry{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line-2);font-size:13.5px;align-items:flex-start}
.log-entry:last-child{border-bottom:none}
.log-time{font-size:11.5px;color:var(--text-3);white-space:nowrap;min-width:130px;padding-top:1px}
.log-badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
.log-badge.login{background:var(--green-bg);color:var(--green)}
.log-badge.logout{background:var(--parch-2);color:var(--text-2)}
.log-badge.create{background:var(--blue-bg);color:var(--blue)}
.log-badge.edit{background:var(--amber-bg);color:var(--amber)}
.log-badge.delete{background:var(--red-bg);color:var(--red)}
.log-badge.view{background:var(--surface-2);color:var(--text-2)}
.log-msg{flex:1;color:var(--text)}
.log-user-chip{font-size:11.5px;font-weight:600;color:var(--ink);background:var(--parch-2);padding:2px 8px;border-radius:6px}

/* ===== Honorários por hora ===== */
.time-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
.time-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.time-card .tc-lbl{font-size:12px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.time-card .tc-val{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--ink);margin-top:10px}
.time-card .tc-sub{font-size:12px;color:var(--text-3);margin-top:4px}
.time-card.clickable{cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
.time-card.clickable:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(22,36,63,.14);border-color:var(--brass)}
.time-card.clickable:active{transform:translateY(-1px)}
.time-card.clickable.active-filter{border-color:var(--brass);box-shadow:0 0 0 2px var(--brass-soft) inset}

/* ===== Dosimetria ===== */
.dos-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.dos-panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.dos-panel h3{font-family:var(--serif);font-size:17px;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.dos-phase{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;font-size:13px;font-weight:700;background:var(--amber-bg);color:var(--brass-deep)}
.dos-result{background:var(--ink);color:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-lg);margin-top:4px}
.dos-result h3{font-family:var(--serif);font-size:20px;color:var(--brass-soft);margin-bottom:16px}
.dos-res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dos-res-item{background:rgba(255,255,255,.06);border-radius:10px;padding:14px;text-align:center}
.dos-res-item .drv{font-family:var(--serif);font-size:24px;font-weight:600;color:#fff}
.dos-res-item .drl{font-size:11px;color:#8b98b5;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.dos-regime{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.1);display:flex;gap:12px;flex-wrap:wrap}
.dos-regime-badge{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}

/* ===== Documentos Jurídicos ===== */
.doc-type-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.doc-tab{
  display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:var(--radius);
  cursor:pointer;transition:all .18s;border:1.5px solid var(--line);background:var(--surface);
  font-family:inherit;text-align:left;position:relative;overflow:hidden;
}
.doc-tab::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent;border-radius:4px 0 0 4px;transition:background .18s}
.doc-tab svg{width:20px;height:20px;flex-shrink:0;opacity:.6;transition:opacity .18s}
.doc-tab:hover{border-color:var(--brass);background:var(--amber-bg);transform:translateY(-1px);box-shadow:0 4px 16px rgba(176,131,50,.12)}
.doc-tab:hover svg{opacity:1}
.doc-tab.active{background:var(--ink);border-color:var(--ink);box-shadow:0 6px 20px rgba(22,36,63,.22);transform:translateY(-1px)}
.doc-tab.active svg{opacity:1;color:var(--brass-soft)}
.doc-tab.active::before{background:var(--brass)}
.doc-tab.crim{border-left:4px solid var(--red)}
.doc-tab.crim:hover,.doc-tab.crim.active{border-left-color:var(--red)}
.doc-tab.trab{border-left:4px solid var(--blue)}
.doc-tab.trab:hover,.doc-tab.trab.active{border-left-color:var(--blue)}
.doc-tab.prev{border-left:4px solid var(--green)}
.doc-tab.prev:hover,.doc-tab.prev.active{border-left-color:var(--green)}
.doc-tab.active.crim{background:var(--red);border-color:var(--red)}
.doc-tab.active.trab{background:var(--blue);border-color:var(--blue)}
.doc-tab.active.prev{background:var(--green);border-color:var(--green)}
.doc-tab .dt-label{font-size:13.5px;font-weight:700;color:var(--ink);transition:color .18s;display:block;line-height:1.2}
.doc-tab .dt-sub-tab{font-size:11.5px;font-weight:400;color:var(--text-2);margin-top:3px;display:block;transition:color .18s}
.doc-tab.active .dt-label,.doc-tab.active .dt-sub-tab{color:#fff}
.doc-tab-inner{display:flex;flex-direction:column;align-items:flex-start;min-width:0}
.doc-tab-ico{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex-shrink:0;background:var(--parch-2);transition:background .18s}
.doc-tab.active .doc-tab-ico{background:rgba(255,255,255,.15)}
.doc-tab.crim .doc-tab-ico{background:var(--red-bg)}
.doc-tab.trab .doc-tab-ico{background:var(--blue-bg)}
.doc-tab.prev .doc-tab-ico{background:var(--green-bg)}
.doc-tab.crim svg{color:var(--red)}
.doc-tab.trab svg{color:var(--blue)}
.doc-tab.prev svg{color:var(--green)}

/* legacy grid kept for older references but hidden */
.doc-type-grid{display:none}
.doc-type-card{display:none}

.doc-builder{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.doc-builder h3{font-family:var(--serif);font-size:18px;color:var(--ink);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.doc-preview{background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--radius-sm);padding:22px;font-family:Georgia,serif;font-size:13.5px;line-height:1.8;color:var(--ink);min-height:300px;margin-top:18px;white-space:pre-wrap;max-height:420px;overflow-y:auto}
.doc-preview-header{text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--line)}

/* ===== Dosimetria Melhorada ===== */
.dos-step{display:flex;align-items:flex-start;gap:14px;margin-bottom:10px;padding:10px;background:rgba(255,255,255,.06);border-radius:9px}
.dos-step-num{width:28px;height:28px;border-radius:8px;background:var(--brass);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700;flex-shrink:0}
.dos-step-body{flex:1}
.dos-step-op{font-size:11.5px;color:#8b98b5;text-transform:uppercase;letter-spacing:.5px}
.dos-step-val{font-size:16px;font-weight:700;color:#fff;font-family:var(--serif)}
.dos-step-eq{font-size:12px;color:#8b98b5;margin-top:2px}
.dos-checkbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dos-check-item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text);transition:all .15s}
.dos-check-item:hover{border-color:var(--brass);background:var(--amber-bg)}
.dos-check-item input{accent-color:var(--brass);width:15px;height:15px}
.dos-check-item.checked{border-color:var(--brass);background:var(--amber-bg);color:var(--brass-deep)}

/* ===== Relatórios ===== */
.rep-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:24px}
.rep-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .15s,transform .12s,border-color .15s}
.rep-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);border-color:var(--brass)}
.rep-ico{width:48px;height:48px;border-radius:13px;display:grid;place-items:center;margin-bottom:14px}
.rep-ico svg{width:24px;height:24px}
.rep-card h3{font-family:var(--serif);font-size:16px;color:var(--ink);margin-bottom:6px}
.rep-card p{font-size:13px;color:var(--text-2);line-height:1.5}
@media(max-width:1100px){.time-summary{grid-template-columns:repeat(2,1fr)}.dos-grid{grid-template-columns:1fr}.rep-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.rep-grid{grid-template-columns:1fr}.dos-res-grid{grid-template-columns:1fr}}

/* ===== NOVOS RECURSOS ===== */

/* --- Sino de Notificações --- */
.notif-btn{position:relative;width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;cursor:pointer;transition:border-color .15s}
.notif-btn svg{width:20px;height:20px;color:var(--text-2)}
.notif-btn:hover{border-color:var(--brass)}
.notif-badge{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:none;place-items:center;padding:0 4px;border:2px solid var(--parch)}
.notif-badge.show{display:grid}
.notif-panel{position:absolute;top:calc(100% + 10px);right:0;width:360px;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-lg);z-index:300;display:none;overflow:hidden;animation:pop .22s ease}
.notif-panel.show{display:block}
.notif-wrap{position:relative;flex-shrink:0}
.notif-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid var(--line-2)}
.notif-head h4{font-family:var(--serif);font-size:16px;color:var(--ink)}
.notif-head button{font-size:12px;color:var(--brass-deep);font-weight:600;cursor:pointer;background:none;border:none}
.notif-list{max-height:360px;overflow-y:auto}
.notif-item{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line-2);transition:background .12s;cursor:default}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--surface-2)}
.notif-item.unread{background:var(--amber-bg)}
.notif-ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.notif-ico svg{width:16px;height:16px}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.notif-desc{font-size:12px;color:var(--text-2);line-height:1.4}
.notif-time{font-size:11px;color:var(--text-3);margin-top:3px}
.notif-empty{text-align:center;padding:28px;color:var(--text-3);font-size:13px}

/* --- Calendário --- */
.cal-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line-2)}
.cal-header h2{font-family:var(--serif);font-size:20px;color:var(--ink);text-transform:capitalize}
.cal-nav{display:flex;gap:8px}
.cal-nav button{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;cursor:pointer;transition:background .12s,border-color .12s}
.cal-nav button:hover{background:var(--parch-2);border-color:var(--brass)}
.cal-nav button svg{width:16px;height:16px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-3);padding:10px 0;border-bottom:1px solid var(--line-2);background:var(--surface-2)}
.cal-cell{min-height:90px;padding:6px;border-right:1px solid var(--line-2);border-bottom:1px solid var(--line-2);transition:background .12s;cursor:pointer}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--parch-2)}
.cal-cell.today{background:var(--amber-bg)}
.cal-cell.other-month .cal-day{color:var(--text-3);opacity:.5}
.cal-day{font-size:14px;font-weight:600;color:var(--ink);width:26px;height:26px;border-radius:50%;display:grid;place-items:center;margin-bottom:4px}
.cal-cell.today .cal-day{background:var(--brass);color:#fff}
.cal-event{font-size:11px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.cal-event.prazo{background:var(--red-bg);color:var(--red)}
.cal-event.compromisso{background:var(--blue-bg);color:var(--blue)}
.cal-event.tarefa{background:var(--green-bg);color:var(--green)}
.cal-event.audiencia{background:var(--amber-bg);color:var(--amber)}
.cal-more{font-size:11px;color:var(--brass-deep);font-weight:600;padding:0 4px}

/* --- Busca Global --- */
.search-panel{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);width:540px;background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-lg);z-index:300;display:none;overflow:hidden}
.search-panel.show{display:block}
.search-results{max-height:400px;overflow-y:auto}
.search-section-lbl{font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-3);font-weight:700;padding:10px 16px 4px}
.search-hit{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .12s}
.search-hit:hover{background:var(--surface-2)}
.search-hit-ico{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.search-hit-ico svg{width:15px;height:15px}
.search-hit-body{flex:1;min-width:0}
.search-hit-title{font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-hit-meta{font-size:12px;color:var(--text-2)}
.search-empty{text-align:center;padding:28px;color:var(--text-3);font-size:13.5px}
.search-topbar-wrap{position:relative;flex-shrink:0}

/* --- Perfil 360° do cliente --- */
.client360-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;margin-top:18px}
.c360-panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.c360-panel-head{padding:14px 18px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:8px}
.c360-panel-head h4{font-family:var(--serif);font-size:15px;color:var(--ink)}
.c360-panel-head svg{width:16px;height:16px;color:var(--text-3)}
.c360-list{padding:0}
.c360-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--line-2);font-size:13px}
.c360-row:last-child{border-bottom:none}
.c360-row-left{color:var(--text-2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c360-row-right{font-weight:600;color:var(--ink);flex-shrink:0;margin-left:12px}
.c360-header{display:flex;align-items:center;gap:16px;padding:20px 22px;border-bottom:1px solid var(--line-2);background:var(--surface-2)}
.c360-av{width:52px;height:52px;border-radius:14px;background:var(--ink);color:var(--brass-soft);display:grid;place-items:center;font-family:var(--serif);font-size:20px;font-weight:700;flex-shrink:0}
.c360-info h3{font-family:var(--serif);font-size:19px;color:var(--ink)}
.c360-info p{font-size:12.5px;color:var(--text-2);margin-top:2px}

/* --- Cobrança WhatsApp --- */
.cob-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.cob-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cob-card-head h4{font-family:var(--serif);font-size:16px;color:var(--ink)}
.cob-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-wpp{background:#25d366;color:#fff;display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:background .15s}
.btn-wpp:hover{background:#1da851}
.btn-wpp svg{width:16px;height:16px}
.btn-copy{background:var(--surface);border:1px solid var(--line);color:var(--text);display:inline-flex;align-items:center;gap:7px;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-copy:hover{border-color:var(--brass);color:var(--brass-deep)}
.btn-copy svg{width:15px;height:15px}
.cob-msg-preview{background:var(--parch-2);border:1px solid var(--line-2);border-radius:10px;padding:14px;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;margin-top:12px;max-height:200px;overflow-y:auto}

/* --- Gráfico Financeiro Avançado --- */
.fin-adv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.fin-chart-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px 14px;box-shadow:var(--shadow);display:flex;flex-direction:column}
.chart-title-row{font-size:11.5px;color:var(--text-2);font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.chart-legend{display:flex;gap:14px;font-size:11.5px}
.chart-legend span{display:flex;align-items:center;gap:5px}
.chart-legend .dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.chart-area{flex:1;min-height:140px;display:flex;flex-direction:column}
.chart-bars{display:flex;align-items:flex-end;gap:6px;flex:1;padding-bottom:4px}
.chart-bar-group{display:flex;gap:3px;align-items:flex-end;flex:1;height:100%}
.chart-bar{border-radius:4px 4px 0 0;min-width:10px;min-height:2px;transition:opacity .2s,transform .2s;cursor:pointer;flex:1}

.chart-bar-desp{background:var(--red)}

.chart-x-lbl{flex:1;text-align:center;font-size:10.5px;color:var(--text-3);font-weight:500}

/* --- Calculadoras Jurídicas --- */
.calc-tabs{display:flex;gap:0;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:22px}
.calc-tab{flex:1;padding:13px 10px;font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer;transition:all .15s;border:none;background:none;border-right:1px solid var(--line);text-align:center;font-family:inherit}

.calc-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:26px;box-shadow:var(--shadow);max-width:780px}
.calc-result{background:var(--ink);color:#fff;border-radius:12px;padding:22px 26px;margin-top:20px}

.calc-res-item{background:rgba(255,255,255,.07);border-radius:9px;padding:14px;text-align:center}
.calc-res-val{font-family:var(--serif);font-size:22px;font-weight:700;color:#fff}
.calc-res-lbl{font-size:10.5px;color:#8b98b5;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.calc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed rgba(255,255,255,.1);font-size:13.5px}
.calc-row:last-child{border-bottom:none}

.calc-btn{background:linear-gradient(150deg,var(--brass),var(--brass-deep));color:#fff;padding:12px 28px;border-radius:11px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit;margin-top:8px;transition:box-shadow .15s,transform .12s;box-shadow:0 4px 14px rgba(176,131,50,.3)}
.calc-btn:hover{box-shadow:0 6px 20px rgba(176,131,50,.42);transform:translateY(-1px)}
.calc-btn:active{transform:none}
.calc-note{font-size:11.5px;color:var(--text-3);margin-top:12px;line-height:1.5;background:var(--parch-2);padding:10px 14px;border-radius:8px}

/* --- Timer flutuante --- */
.timer-float{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;border-radius:16px;padding:14px 18px;box-shadow:var(--shadow-lg);z-index:500;display:none;align-items:center;gap:14px;font-size:14px;min-width:220px}

.timer-btns button svg{width:14px;height:14px}
.timer-pause{background:var(--amber);color:#fff}
.timer-stop{background:var(--red);color:#fff}

</style>

<script>
/* ============================================================
   LEXORA — Sistema de Gestão Jurídica
   Armazenamento 100% local via IndexedDB
   ============================================================ */

/* ---------- IndexedDB wrapper ---------- */
const DB_NAME='lexora_db', DB_VER=6;
const STORES=['clientes','processos','prazos','compromissos','financeiro','tarefas','documentos','config','honorarios','timesheet','contratos','contratosAcomp','usuarios','logs','anexos','andamentos','leads','interacoes'];
let db;

function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      STORES.forEach(s=>{ if(!d.objectStoreNames.contains(s)) d.createObjectStore(s,{keyPath:'id'}); });
    };
    r.onsuccess=e=>{db=e.target.result;res(db);};
    r.onerror=e=>rej(e.target.error);
    r.onblocked=()=>{
      // Old version open in another tab — just proceed anyway after a delay
      console.warn('IndexedDB blocked by another tab. Close other tabs of this app.');
      setTimeout(()=>{ const r2=indexedDB.open(DB_NAME); r2.onsuccess=e=>{db=e.target.result;res(db);}; r2.onerror=e=>rej(e.target.error); }, 500);
    };
  });
}
function tx(store,mode='readonly'){return db.transaction(store,mode).objectStore(store);}
function dbAll(store){return new Promise((res,rej)=>{const r=tx(store).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
function dbGet(store,id){return new Promise((res,rej)=>{const r=tx(store).get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbPut(store,obj){return new Promise((res,rej)=>{const r=tx(store,'readwrite').put(obj);r.onsuccess=()=>res(obj);r.onerror=()=>rej(r.error);});}
function dbDel(store,id){return new Promise((res,rej)=>{const r=tx(store,'readwrite').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
function dbClear(store){return new Promise((res,rej)=>{const r=tx(store,'readwrite').clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);

/* ---------- helpers ---------- */
const $=(s,p=document)=>p.querySelector(s);
const $$=(s,p=document)=>[...p.querySelectorAll(s)];
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const moneyBR=n=>(Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const initials=n=>{const p=String(n||'?').trim().split(/\s+/);return ((p[0]?.[0]||'')+(p.length>1?p[p.length-1][0]:'')).toUpperCase()||'?';};
function fmtDate(iso){if(!iso)return '—';const d=new Date(iso+(iso.length<=10?'T00:00:00':''));return isNaN(d)?'—':d.toLocaleDateString('pt-BR');}
function fmtDateTime(iso){if(!iso)return '—';const d=new Date(iso);return isNaN(d)?'—':d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
const todayISO=()=>new Date().toISOString().slice(0,10);
function daysUntil(iso){if(!iso)return null;const d=new Date(iso+'T00:00:00');const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000);}
function maskCpfCnpj(v){v=String(v||'').replace(/\D/g,'');if(v.length<=11)return v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');return v.replace(/^(\d{2})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1/$2').replace(/(\d{4})(\d{1,2})$/,'$1-$2');}
function maskCNJ(v){v=String(v||'').replace(/\D/g,'').slice(0,20);return v.replace(/^(\d{7})(\d)/,'$1-$2').replace(/^(\d{7}-\d{2})(\d)/,'$1.$2').replace(/(\.\d{4})(\d)/,'$1.$2').replace(/(\.\d)(\d)/,'$1.$2').replace(/(\.\d{2})(\d{1,4})$/,'$1.$2');}

const ICON={
  dash:'<path d="M3 12l9-9 9 9M5 10v10h5v-6h4v6h5V10"/>',
  clients:'<path d="M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0zM3 21v-1a6 6 0 0 1 6-6h6a6 6 0 0 1 6 6v1"/>',
  cases:'<path d="M3 7h18v13H3zM3 7l2-3h14l2 3M9 12h6"/>',
  deadline:'<circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M9 2h6"/>',
  agenda:'<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',

/* --- Permissions helpers --- */
const ALL_PAGE_IDS = () => PAGES.map(p => p.id);
function userCanAccess(pageId) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true; // admin always has full access
  const perms = currentUser.permissions;
  if (!perms || perms.length === 0) {
    // default permissions by role if never configured
    const defaults = {
      advogado: ['dashboard','clientes','processos','prazos','agenda','calendario','tarefas','financeiro','acompanhamento','cobranca','documentos','contratos','honorarios','dosimetria','calculadoras','relatorios'],
      assistente: ['dashboard','clientes','prazos','agenda','calendario','tarefas','documentos'],
    };
    return (defaults[currentUser.role] || ['dashboard']).includes(pageId);
  }
  return perms.includes(pageId);
}

function buildNav(){
  const nav=$('#nav');let html='';let lastGroup='';
  PAGES.forEach(p=>{
    if(!userCanAccess(p.id)) return;
    if(p.group!==lastGroup){html+=`<div class="nav-label">${p.group}</div>`;lastGroup=p.group;}
    html+=`<button class="nav-item" data-page="${p.id}">${svg(ICON[p.icon])}<span>${p.label}</span><span class="nav-badge" id="badge-${p.id}" style="display:none"></span></button>`;
  });
  nav.innerHTML=html;
  $$('.nav-item',nav).forEach(b=>b.onclick=()=>{goto(b.dataset.page);closeSidebar();});
}
async function goto(id){
  if(!userCanAccess(id)){toast('Acesso não permitido para o seu perfil','warn');return;}
  if(!RENDER[id]){toast('Módulo indisponível','warn');return;}
  current=id;const p=PAGES.find(x=>x.id===id);
  if(p){$('#pageTitle').textContent=p.title;$('#pageSub').textContent=p.sub;}
  $$('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.page===id));
  // sync bottom nav
  document.querySelectorAll('#mNav button').forEach(b=>b.classList.toggle('active',b.dataset.page===id));
  $('#content').scrollTop=0;
  await RENDER[id]();
  $('#content').querySelector('.view')?.classList.add('active');
}

        <div class="panel-body">
          ${tarPend.length?tarPend.map(t=>`

                <div class="tl-title">${esc(t.titulo)}</div>
                <div class="tl-meta">${pillPrio(t.prioridade)}${t.dataVencimento?'<span>• vence '+fmtDate(t.dataVencimento)+'</span>':''}</div>

function kpi(b,ic,val,lbl,nav){return `<div class="kpi${nav?' clickable':''}"${nav?` data-nav="${nav}" role="button" tabindex="0"`:''}><div class="kpi-ico ${b}">${svg(ICON[ic])}</div><div class="kpi-val">${val}</div><div class="kpi-lbl">${lbl}</div></div>`;}
function renderTL(x){
  const d=new Date((x.data||'')+'T00:00:00');
  const day=isNaN(d)?'?':d.getDate();
  const mon=isNaN(d)?'':d.toLocaleDateString('pt-BR',{month:'short'}).replace('.','');
  const du=daysUntil(x.data);
  let badge='';
  if(x.tipo==='prazo'){const c=du<0?'bg-red':du<=3?'bg-amber':'bg-blue';badge=`<span class="badge ${c}"><span class="bdot"></span>${du<0?'Vencido':du===0?'Hoje':'Prazo'}</span>`;}
  else badge=`<span class="badge bg-gray"><span class="bdot"></span>${esc(x.tipo)}</span>`;
  return `<div class="tl-item">
    <div class="tl-mark"><div class="tl-day">${day}</div><div class="tl-mon">${mon}</div></div>
    <div class="tl-body"><div class="tl-title">${esc(x.titulo)}</div>
      <div class="tl-meta">${badge}${x.hora?'<span>• '+esc(x.hora)+'</span>':''}${x.meta?'<span>• '+esc(x.meta)+'</span>':''}</div>
    </div></div>`;
}
function emptyMini(t){return `<div style="text-align:center;padding:38px 16px;color:var(--text-3);font-size:13.5px">${t}</div>`;}
function finBar(lbl,val,max,color){const pct=Math.round(val/max*100);return `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:var(--text-2)">${lbl}</span><b style="color:${color}">${moneyBR(val)}</b></div><div style="height:9px;background:var(--parch-2);border-radius:6px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${color};border-radius:6px;transition:width .6s"></div></div></div>`;}
function areaChart(proc){
  if(!proc.length)return emptyMini('Cadastre processos para ver a distribuição');
  const by={};proc.forEach(p=>{const a=p.area||'Outros';by[a]=(by[a]||0)+1;});
  const max=Math.max(...Object.values(by));const cols=['var(--brass)','var(--blue)','var(--green)','var(--amber)','var(--red)','var(--ink-soft)'];
  return Object.entries(by).sort((a,b)=>b[1]-a[1]).map(([a,n],i)=>`
    <div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span style="color:var(--text)">${esc(a)}</span><b style="color:var(--text-2)">${n}</b></div>
    <div style="height:8px;background:var(--parch-2);border-radius:5px;overflow:hidden"><div style="height:100%;width:${n/max*100}%;background:${cols[i%cols.length]};border-radius:5px"></div></div></div>`).join('');
}
function procLabel(proc,id){const p=proc.find(x=>x.id===id);return p?(p.numero||p.tipoAcao||'Processo'):'';}
function prioColor(p){return p==='alta'?'var(--red)':p==='media'?'var(--amber)':'var(--green)';}
function pillPrio(p){const m={alta:['bg-red','Alta'],media:['bg-amber','Média'],baixa:['bg-green','Baixa']};const[c,l]=m[p]||m.media;return `<span class="badge ${c}"><span class="bdot"></span>${l}</span>`;}
function updateBadges(prazos,tarefas){
  const b1=$('#badge-prazos');if(b1){b1.style.display=prazos>0?'grid':'none';b1.textContent=prazos;}
  const b2=$('#badge-tarefas');if(b2){b2.style.display=tarefas>0?'grid':'none';b2.textContent=tarefas;}
}

let prazoF='abertos';
RENDER.prazos=async function(){
  const prazos=await dbAll('prazos');const proc=await dbAll('processos');const cli=await dbAll('clientes');
  let list=prazos.slice();
  if(prazoF==='abertos')list=list.filter(p=>p.status!=='cumprido');
  else if(prazoF==='cumpridos')list=list.filter(p=>p.status==='cumprido');
  else if(prazoF==='vencidos')list=list.filter(p=>p.status!=='cumprido'&&daysUntil(p.dataPrazo)<0);
  list.sort((a,b)=>(a.dataPrazo||'9').localeCompare(b.dataPrazo||'9'));
  const cnt={abertos:prazos.filter(p=>p.status!=='cumprido').length,vencidos:prazos.filter(p=>p.status!=='cumprido'&&daysUntil(p.dataPrazo)<0).length,cumpridos:prazos.filter(p=>p.status==='cumprido').length};
  $('#content').innerHTML=`<div class="view">
    <div class="toolbar">

      </button>`).join('')}
    </div>
    <div id="docBuilderArea"></div>
  </div>`;
  let tipoAtivo='peticao_criminal';
  function renderBuilder(tipo){
    tipoAtivo=tipo;
    $$('.doc-tab').forEach(c=>c.classList.toggle('active',c.dataset.tipo===tipo));
    const area=$('#docBuilderArea');
    if(tipo==='peticao_criminal') area.innerHTML=peticaoCriminalForm(cli,proc,cfg);
    else if(tipo==='peticao_trabalhista') area.innerHTML=peticaoTrabalhistaForm(cli,proc,cfg);
    else if(tipo==='peticao_previdenciario') area.innerHTML=peticaoPrevidenciarioForm(cli,proc,cfg);
    else if(tipo==='contrato') area.innerHTML=contratoForm(cli,proc,cfg);
    else if(tipo==='recibo') area.innerHTML=reciboForm(cli,proc,cfg);
    else if(tipo==='procuracao') area.innerHTML=procuracaoForm(cli,proc,cfg);
    else if(tipo==='proposta') area.innerHTML=propostaForm(cli,proc,cfg);
    bindDocForm(tipo,cli,proc,cfg);
  }
  $$('[data-tipo]').forEach(c=>c.onclick=()=>renderBuilder(c.dataset.tipo));
  renderBuilder('peticao_criminal');
  $('.view').classList.add('active');
};

function bindDocForm(tipo,cli,proc,cfg){
  const btn=$('#btnPreviewDoc');const btnG=$('#btnGerarDoc');
  if(!btn)return;
  function getCliData(){
    const sel=$('#dc_cliente');const id=sel?.value;
    return id?cli.find(c=>c.id===id):null;
  }
  function getProcData(){
    const sel=$('#dc_processo');const id=sel?.value;
    return id?proc.find(p=>p.id===id):null;
  }
  function v(id){return $(id)?.value||'';}

  /* ---- helpers compartilhados ---- */
  function cabecalhoCriminal(juizo,tipoPeca,autor,autorDoc,autorEnd){
    return `EXCELENTÍSSIMO(A) SENHOR(A) ${juizo.toUpperCase()}\n\n${tipoPeca.toUpperCase()}\n\n${autor.toUpperCase()}${autorDoc}${autorEnd}`;
  }
  function rodapeAssinatura(adv,oab,advTel,advEmail,cidade,hoje,procRef){
    return `Termos em que pede deferimento.\n\n${cidade}, ${hoje}.\n\n_____________________________________________\n${adv}\nOAB ${oab}${advTel?`\nTel.: ${advTel}`:''}${advEmail?`\nE-mail: ${advEmail}`:''}${procRef}`;
  }
  function urgenciaTexto(urgencia){
    if(urgencia==='tutela_antecipada') return `\n\nDA TUTELA ANTECIPADA\n\nRequere-se, com fundamento no art. 300 do CPC/2015, a concessão de tutela antecipada em caráter antecedente, presentes: (a) probabilidade do direito; (b) perigo de dano ou risco ao resultado útil do processo.`;
    if(urgencia==='tutela_cautelar') return `\n\nDA TUTELA CAUTELAR\n\nRequere-se, com fundamento no art. 301 do CPC/2015, a concessão de medida cautelar, em razão do fundado receio de lesão grave e de difícil reparação.`;
    if(urgencia==='liminar') return `\n\nDA LIMINAR INAUDITA ALTERA PARTE\n\nRequer-se a concessão de liminar sem a oitiva da parte contrária, ante o perigo de ineficácia da medida, nos termos do art. 300, §2º do CPC/2015.`;
    return '';
  }
  function gratuidadeTexto(gratuita,base){
    if(gratuita!=='sim') return '';
    return `\n\nDA GRATUIDADE DA JUSTIÇA\n\nO(A) Requerente, por ser pessoa hipossuficiente econômica, requer a concessão dos benefícios da Justiça Gratuita, conforme art. 98 e ss. do CPC/2015${base?' c/c '+base:''} e art. 5º, LXXIV da CF/88.`;
  }

  function gerarConteudo(){
    const c=getCliData();const p=getProcData();
    const adv=cfg.nome||'[NOME DO ADVOGADO]';const oab=cfg.oab||'[OAB]';
    const advEnd=cfg.endereco||'[ENDEREÇO DO ESCRITÓRIO]';
    const advTel=cfg.telefone||'';const advEmail=cfg.email||'';
    const hoje=new Date().toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'});
    const procRef=p?`\n\nProcesso de referência: ${p.numero||p.tipoAcao||''}`:''

    /* ========== CRIMINAL ========== */
    if(tipo==='peticao_criminal'){
      const nome=c?.nome||'[NOME DO REQUERENTE]';
      const doc=c?.cpfCnpj?`, portador(a) do CPF/CNPJ nº ${c.cpfCnpj}`:'';
      const end=c?.endereco?`, residente e domiciliado(a) em ${c.endereco}`:'';
      const tipoPeca=v('#dc_tipo_peça')||'Petição Criminal';

function numPorExtenso(n){
  if(!n||isNaN(n))return 'valor';
  const u=['','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
  const d=['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
  const c=['','cento','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
  function dezena(n){if(n<20)return u[n];const r=n%10;return d[Math.floor(n/10)]+(r?' e '+u[r]:'');}
  function centena(n){if(n===100)return 'cem';if(n<100)return dezena(n);const r=n%100;return c[Math.floor(n/100)]+(r?' e '+dezena(r):'');}
  const reais=Math.floor(n);const cts=Math.round((n-reais)*100);
  let txt='';
  if(reais>=1000){txt+=centena(Math.floor(reais/1000))+' mil'+(reais%1000?' e '+centena(reais%1000):'');}
  else txt+=centena(reais);
  txt+=' reais';
  if(cts>0)txt+=' e '+dezena(cts)+' centavos';
  return txt;
}

/* Cabeçalho do timbrado (vai no <thead> — repete no topo de cada página) */
function timbradoHeader(cfg){
  cfg=cfg||{};
  const nome=cfg.nome?cfg.nome:'Advogado(a)';
  const oab=cfg.oab?` &nbsp;·&nbsp; ${cfg.oab}`:'';

    <div class="tmb-oab">Advogado${oab}</div>
  </div>`;
}

/* Linhas de contato (rodapé direito) */
function timbradoContato(cfg){
  cfg=cfg||{};
  const ico=(p)=>`<svg viewBox="0 0 16 16" width="9" height="9" fill="${TMB.gold}" style="vertical-align:-1px;margin-left:6px;flex:0 0 auto">${p}</svg>`;
  const PHONE='<path d="M2.3 3.2c0-.4.3-.7.7-.7h2c.3 0 .6.2.7.5l.7 2c.1.3 0 .6-.2.8l-1 .9c.6 1.2 1.6 2.2 2.8 2.8l.9-1c.2-.2.5-.3.8-.2l2 .7c.3.1.5.4.5.7v2c0 .4-.3.7-.7.7C6.5 13.1 2.9 9.5 2.3 3.2z"/>';
  const MAIL='<path d="M2 4.2c0-.4.3-.7.7-.7h10.6c.4 0 .7.3.7.7v7.6c0 .4-.3.7-.7.7H2.7a.7.7 0 0 1-.7-.7V4.2zm1.7.3L8 7.9l4.3-3.4H3.7z"/>';
  const PIN='<path d="M8 1.6a4 4 0 0 0-4 4c0 2.8 4 8.8 4 8.8s4-6 4-8.8a4 4 0 0 0-4-4zm0 5.6a1.6 1.6 0 1 1 0-3.2 1.6 1.6 0 0 1 0 3.2z"/>';
  const L=[];
  if(cfg.telefone)L.push(`<div class="tmb-cl">${cfg.telefone}${ico(PHONE)}</div>`);
  if(cfg.email)L.push(`<div class="tmb-cl">${cfg.email}${ico(MAIL)}</div>`);
  const ender=cfg.endereco||cfg.cidade;
  if(ender)L.push(`<div class="tmb-cl">${ender}${ico(PIN)}</div>`);
  return `<div class="tmb-contato">${L.join('')}</div>`;
}

/* Rodapé do timbrado (vai no <tfoot> — repete no fim de cada página).
   Balança decorativa à esquerda + contatos à direita + data centralizada. */
function timbradoFooter(cfg,dateLine){
  cfg=cfg||{};
  let op=0.55;
  const v=cfg.logoOpacity;
  if(v||v===0)op=Math.max(0.18,Math.min(1,0.3+(v/40)*0.7));
  return `<div class="tmb-runfoot">
    <div class="tmb-fdiv"></div>
    <div class="tmb-frow">
      <div class="tmb-fmark" aria-hidden="true" style="opacity:${op}">${timbradoScalesSVG()}</div>
      ${timbradoContato(cfg)}
    </div>
    ${dateLine?`<div class="tmb-fdate">${dateLine}</div>`:''}
  </div>`;
}

/* CSS compartilhado do timbrado (injetado em cada PDF).

  .tmb-emblem{flex:0 0 auto;display:flex;align-items:center;justify-content:center}

  .tmb-oab{text-align:center;color:${TMB.goldDeep};font-size:10px;letter-spacing:1.6px;margin-top:4px;text-transform:uppercase}
  .tmb-runfoot{padding:12px 0 2px}
  .tmb-fdiv{height:0;border-top:1px solid ${TMB.gold};margin-bottom:9px}
  .tmb-frow{display:flex;align-items:flex-end;justify-content:space-between;gap:18px}
  .tmb-fmark{flex:0 0 auto;width:52px;height:58px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .tmb-contato{text-align:right;font-size:9.5px;color:${TMB.ink};line-height:1.85;letter-spacing:.2px;font-family:Arial,Helvetica,sans-serif}
  .tmb-cl{display:flex;align-items:center;justify-content:flex-end}
  .tmb-fdate{text-align:center;font-size:8.5px;color:#a9a194;letter-spacing:.3px;margin-top:9px}
  @media print{.no-print{display:none!important}.tmb-fmark{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  `;
}

/* Abre o documento PDF com o timbrado (cabeçalho + rodapé repetidos).
   opts: {extraCSS, dateLine, bodyCSS} */
function timbradoOpen(titulo,cfg,opts){
  opts=opts||{};cfg=cfg||{};
  const bodyCSS=opts.bodyCSS||"font-family:Georgia,serif;color:#1a1a2e;font-size:13.5px;line-height:1.9";
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${titulo}</title><style>
  *{box-sizing:border-box}
  body{${bodyCSS};background:#fff}
  ${timbradoCSS()}
  ${opts.extraCSS||''}
  </style></head><body>
  <table class="tmb-sheet">
    <thead><tr><td class="tmb-hcell">${timbradoHeader(cfg)}</td></tr></thead>
    <tfoot><tr><td class="tmb-fcell">${timbradoFooter(cfg,opts.dateLine||'')}</td></tr></tfoot>
    <tbody><tr><td class="tmb-content">`;
}

/* Fecha o documento PDF (botão de impressão + tabela). */
function timbradoClose(opts){
  opts=opts||{};

  return `<div class="no-print" style="text-align:center;margin-top:26px"><button onclick="window.print()" style="padding:11px 32px;background:#16243f;color:#fff;border:none;border-radius:9px;cursor:pointer;font-size:14px;font-family:Georgia,serif">${label}</button></div>
    </td></tr></tbody>
  </table>
  </body></html>`;
}

function gerarDocPDF(conteudo,titulo,cfg,cliente){
  cfg=cfg||{};
  const hoje=new Date().toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'});
  const dateLine=`Emitido em ${hoje}${cfg.rodape?` &nbsp;·&nbsp; ${cfg.rodape}`:''}`;
  const extraCSS=`
    .doc-title{text-align:center;margin:6px 0 24px;padding-bottom:14px;border-bottom:1px solid #e3ddd0}
    .doc-title h1{font-size:16px;font-weight:700;color:#16243f;letter-spacing:.8px;text-transform:uppercase}
    .docbody{white-space:pre-wrap;font-size:13.5px;line-height:2;color:#1a1a2e;text-align:justify}
    @media print{body{font-size:12.5px}}
  `;
  const w=window.open('','_blank','width=820,height=1050');
  w.document.write(
    timbradoOpen(titulo,cfg,{extraCSS,dateLine,bodyCSS:"font-family:Georgia,serif;color:#1a1a2e;font-size:13.5px;line-height:1.9"})
    +`<div class="doc-title"><h1>${titulo}</h1></div>
      <div class="docbody">${conteudo.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`
    +timbradoClose({label:'🖨️ Imprimir / Salvar como PDF'})
  );
  w.document.close();
  setTimeout(()=>w.print(),700);
}

/* ---- branding: aplica logo + bg ao DOM ---- */
function applyBranding(logo,bgImage,logoOpacity,bgOpacity){
  // plano de fundo do sistema
  let overlay=$('#bgOverlay');
  if(bgImage){
    const op=Math.max(0.05,Math.min(1,(bgOpacity||100)/100));
    if(!overlay){overlay=document.createElement('div');overlay.id='bgOverlay';document.body.appendChild(overlay);}
    overlay.style.backgroundImage=`url('${bgImage}')`;
    overlay.style.opacity=op;
    document.body.classList.add('has-bg');
  } else {
    if(overlay){overlay.style.backgroundImage='';overlay.remove();}
    document.body.classList.remove('has-bg');
  }
}

/* ---- aplica branding ao iniciar ---- */
async function loadBranding(){
  const cfg=(await dbGet('config','escritorio'))||{};
  if(cfg.bgImage)applyBranding(null,cfg.bgImage,null,(cfg.bgOpacity&&cfg.bgOpacity>=20)?cfg.bgOpacity:100);
}
async function exportData(){
  const data={_app:'Lexora',_versao:1,_data:new Date().toISOString()};
  for(const s of STORES)data[s]=await dbAll(s);
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`lexora-backup-${todayISO()}.json`;a.click();URL.revokeObjectURL(a.href);
  toast('Backup exportado com sucesso');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data._app!=='Lexora')if(!confirm('Arquivo não reconhecido como backup Lexora. Importar mesmo assim?'))return;
      let n=0;
      for(const s of STORES){if(Array.isArray(data[s])){for(const item of data[s]){if(item&&item.id){await dbPut(s,item);n++;}}}}
      toast(`${n} registros importados`);goto(current);
    }catch(err){toast('Arquivo inválido','err');}
  };
  reader.readAsText(file);e.target.value='';
}

/* ============================================================
   CONTRATOS DE ACOMPANHAMENTO (ANUAL c/ MENSALIDADE)
   Gestão de contratos recorrentes, planos de pagamento,
   baixa de mensalidades (integra ao financeiro), geração de
   contrato em PDF e recibo por parcela.
   ============================================================ */
let acompFilter='ativos';

/* ---- helpers de data/parcela ---- */
function addMonthsISO(iso,n){
  const d=new Date((iso||todayISO())+'T00:00:00');const day=d.getDate();
  d.setDate(1);d.setMonth(d.getMonth()+n);
  const last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  d.setDate(Math.min(day,last));
  return d.toISOString().slice(0,10);
}
function competenciaParcela(dataInicio,idx){
  const b=new Date((dataInicio||todayISO())+'T00:00:00');
  const dt=new Date(b.getFullYear(),b.getMonth()+idx,1);
  return dt.toISOString().slice(0,7);
}
function vencimentoParcela(dataInicio,idx,diaVenc){
  const b=new Date((dataInicio||todayISO())+'T00:00:00');
  const dt=new Date(b.getFullYear(),b.getMonth()+idx,1);
  const last=new Date(dt.getFullYear(),dt.getMonth()+1,0).getDate();
  dt.setDate(Math.min(Number(diaVenc)||10,last));
  return dt.toISOString().slice(0,10);
}
function fmtComp(comp){
  if(!comp)return '—';const[y,m]=comp.split('-');
  const M=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${M[Number(m)-1]||m}/${y}`;
}
function parcelaSituacao(p){
  if(p.status==='pago')return{key:'pago',label:'Paga',cls:'bg-green'};
  const d=daysUntil(p.vencimento);
  if(d===null)return{key:'pendente',label:'Pendente',cls:'bg-gray'};
  if(d<0)return{key:'atrasado',label:'Em atraso',cls:'bg-red'};
  if(d===0)return{key:'hoje',label:'Vence hoje',cls:'bg-amber'};
  if(d<=7)return{key:'avencer',label:`Vence em ${d}d`,cls:'bg-amber'};
  return{key:'futura',label:'A vencer',cls:'bg-blue'};
}
function gerarParcelas(ct,anteriores){
  anteriores=anteriores||[];
  const pagas={};anteriores.forEach(p=>{if(p.status==='pago')pagas[p.competencia]=p;});
  const out=[];const meses=Number(ct.meses)||12;
  for(let i=0;i<meses;i++){
    const comp=competenciaParcela(ct.dataInicio,i);
    if(pagas[comp]){out.push(pagas[comp]);continue;}
    out.push({competencia:comp,vencimento:vencimentoParcela(ct.dataInicio,i,ct.diaVenc),valor:Number(ct.valorMensal)||0,status:'pendente',dataPagamento:null,finId:null,forma:''});
  }
  return out;
}

  const all=await dbAll('contratosAcomp');const ano=new Date().getFullYear();
  const n=all.filter(c=>(c.numero||'').endsWith('/'+ano)).length+1;
  return `ACMP-${String(n).padStart(3,'0')}/${ano}`;
}

            <button class="icon-btn danger" data-del="${c.id}" title="Excluir">${svg(ICON.trash)}</button>
          </div></td></tr>`;}).join('')}</tbody></table></div></div>`
    :emptyState('repeat','Nenhum contrato de acompanhamento','Cadastre contratos anuais com mensalidade para gerir o acompanhamento processual de execução e a receita recorrente do escritório.','Novo contrato','addAcomp')}
  </div>`;

      <div class="field"><label>Situação</label><select name="status">${[['ativo','Ativo'],['suspenso','Suspenso'],['encerrado','Encerrado']].map(o=>`<option value="${o[0]}" ${ct.status===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select></div>

async function pagarParcela(id,idx){
  const ct=await dbGet('contratosAcomp',id);if(!ct||!ct.parcelas||!ct.parcelas[idx])return;
  const p=ct.parcelas[idx];
  openModal(`
    <div class="modal-head"><div><h2>Dar baixa na mensalidade</h2><p>${fmtComp(p.competencia)} — ${moneyBR(p.valor)}</p></div>
      <button class="modal-close" onclick="closeModal()">${svg(ICON.x)}</button></div>
    <div class="modal-body"><form id="frm">
      <div class="field"><label>Data do pagamento</label><input name="data" type="date" value="${todayISO()}"></div>
      <div class="field"><label>Valor recebido (R$)</label><input name="valor" type="number" step="0.01" value="${esc(p.valor)}"></div>
      <div class="field col-2"><label>Forma de pagamento</label><select name="forma">${['PIX','Transferência','Dinheiro','Cartão','Boleto','Cheque'].map(m=>`<option>${m}</option>`).join('')}</select></div>
    </form></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="save">${svg(ICON.check)} Confirmar pagamento</button></div>`);
  $('#save').onclick=async()=>{
    const fd=new FormData($('#frm'));
    const valor=Number(fd.get('valor'))||Number(p.valor)||0;
    const data=fd.get('data')||todayISO();
    const finId=p.finId||uid();
    await dbPut('financeiro',{id:finId,tipo:'receita',descricao:`Mensalidade ${fmtComp(p.competencia)} — ${ct.numero||'Acompanhamento'}`,valor:String(valor),categoria:'Mensalidade — Acompanhamento',data,status:'pago',clienteId:ct.clienteId,processoId:(ct.processoIds||[])[0]||'',formaPagamento:fd.get('forma')});
    p.status='pago';p.dataPagamento=data;p.forma=fd.get('forma');p.valor=valor;p.finId=finId;
    await dbPut('contratosAcomp',ct);
    closeModal();toast('Pagamento registrado e lançado no financeiro');acompDetail(id);
  };
}
async function estornarParcela(id,idx){
  const ct=await dbGet('contratosAcomp',id);if(!ct||!ct.parcelas||!ct.parcelas[idx])return;
  const p=ct.parcelas[idx];
  if(p.finId){try{await dbDel('financeiro',p.finId);}catch(e){}}
  p.status='pendente';p.dataPagamento=null;p.forma='';p.finId=null;
  await dbPut('contratosAcomp',ct);
  toast('Pagamento estornado');acompDetail(id);
}
