function openPDF(html,titulo){
  const w=window.open('','_blank','width=900,height=1000');
  w.document.write(html);w.document.close();
  setTimeout(()=>{w.print();},600);
}

function pdfBase(titulo,cfg){
  const data=new Date().toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'});
  const nome=cfg?.nome||'Escritório';const oab=cfg?.oab?` · OAB ${cfg.oab}`:'';const cidade=cfg?.cidade?` · ${cfg.cidade}`:'';
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${titulo}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Georgia',serif;color:#1f2733;font-size:13px;line-height:1.5}
    .header{background:#16243f;color:#fff;padding:28px 40px 22px;display:flex;justify-content:space-between;align-items:flex-end}
    .header h1{font-size:20px;font-weight:normal;color:#e9d9b6;letter-spacing:.5px}
    .header .meta{font-size:11px;color:#8b98b5;margin-top:4px}
    .header .escritorio{text-align:right;font-size:12px;color:#cdd6e6}
    .content{padding:28px 40px}
    table{width:100%;border-collapse:collapse;margin-bottom:24px}
    th{background:#f4f0e8;text-align:left;padding:9px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#5d6573;border-bottom:2px solid #e3ddd0}
    td{padding:9px 12px;border-bottom:1px solid #f0ece2;font-size:12.5px}
    tr:last-child td{border-bottom:none}
    .section-h{font-size:15px;font-family:Georgia,serif;color:#16243f;margin:20px 0 10px;padding-bottom:6px;border-bottom:2px solid #b08332}
    .badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700}
    .badge-green{background:#e6f0e8;color:#3f7d54}.badge-red{background:#f6e3e1;color:#b23a3a}
    .badge-amber{background:#f7eed6;color:#c08a2a}.badge-blue{background:#e5ebf6;color:#3a5a9b}.badge-gray{background:#f0ece2;color:#5d6573}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px}
    .sum-box{background:#f4f0e8;border-radius:8px;padding:14px}
    .sum-box .sv{font-size:20px;font-family:Georgia,serif;font-weight:700;color:#16243f}
    .sum-box .sl{font-size:11px;color:#5d6573;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
    .footer{margin-top:32px;padding-top:14px;border-top:1px solid #e3ddd0;font-size:11px;color:#8b98b5;display:flex;justify-content:space-between}
    @media print{button{display:none!important}.no-print{display:none}}
  </style></head><body>
  <div class="header">
    <div><h1>${titulo}</h1><div class="meta">Gerado em ${data}</div></div>
    <div class="escritorio"><b>${nome}</b>${oab}<br>${cidade?cidade.slice(3):'Brasil'}</div>
  </div>
  <div class="content">`;
}
function pdfFoot(){
  return `<div class="footer"><span>Lexora — Gestão Jurídica</span><span>Documento gerado automaticamente em ${new Date().toLocaleString('pt-BR')}</span></div>
  <div class="no-print" style="text-align:center;margin-top:20px"><button onclick="window.print()" style="padding:10px 28px;background:#16243f;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">🖨️ Imprimir / Salvar PDF</button></div>
  </div></body></html>`;
}

async function repClientes(){
  const cli=await dbAll('clientes');
  const proc=await dbAll('processos');
  const cfg=(await dbGet('config','escritorio'))||{};
  let h=pdfBase('Relatório de Clientes',cfg);
  h+=`<div class="summary-grid">
    <div class="sum-box"><div class="sv">${cli.length}</div><div class="sl">Total de clientes</div></div>
    <div class="sum-box"><div class="sv">${cli.filter(c=>c.tipo==='PF').length}</div><div class="sl">Pessoas Físicas</div></div>
    <div class="sum-box"><div class="sv">${cli.filter(c=>c.tipo==='PJ').length}</div><div class="sl">Pessoas Jurídicas</div></div>
  </div>
  <table><thead><tr><th>Nome</th><th>Tipo</th><th>CPF/CNPJ</th><th>Telefone</th><th>E-mail</th><th>Processos</th></tr></thead><tbody>`;
  cli.sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).forEach(c=>{
    const np=proc.filter(p=>p.clienteId===c.id).length;
    h+=`<tr><td><b>${esc(c.nome)}</b></td><td>${c.tipo==='PJ'?'PJ':'PF'}</td><td>${esc(c.cpfCnpj||'—')}</td><td>${esc(c.telefone||'—')}</td><td>${esc(c.email||'—')}</td><td>${np}</td></tr>`;
  });
  h+=`</tbody></table>`;h+=pdfFoot();openPDF(h,'Relatório de Clientes');
}

async function repProcessos(){
  const proc=await dbAll('processos');
  const cli=await dbAll('clientes');
  const cfg=(await dbGet('config','escritorio'))||{};
  const ativos=proc.filter(p=>p.status!=='Encerrado'&&p.status!=='Arquivado');
  let h=pdfBase('Relatório de Processos',cfg);
  h+=`<div class="summary-grid">
    <div class="sum-box"><div class="sv">${proc.length}</div><div class="sl">Total de processos</div></div>
    <div class="sum-box"><div class="sv">${ativos.length}</div><div class="sl">Processos ativos</div></div>
    <div class="sum-box"><div class="sv">${moneyBR(proc.reduce((s,p)=>s+Number(p.valorCausa||0),0))}</div><div class="sl">Valor total das causas</div></div>
  </div>
  <table><thead><tr><th>Ação</th><th>Nº CNJ</th><th>Cliente</th><th>Área</th><th>Status</th><th>Valor da Causa</th><th>Comarca</th></tr></thead><tbody>`;
  proc.sort((a,b)=>(a.tipoAcao||'').localeCompare(b.tipoAcao||'')).forEach(p=>{
    const stBg={'Em andamento':'badge-blue','Aguardando audiência':'badge-amber','Sentenciado':'badge-green','Encerrado':'badge-gray','Arquivado':'badge-gray'}[p.status]||'badge-gray';
    h+=`<tr><td><b>${esc(p.tipoAcao||'—')}</b></td><td style="font-size:11px;font-family:monospace">${esc(p.numero||'—')}</td><td>${esc(cliName(cli,p.clienteId))}</td><td>${esc(p.area||'—')}</td><td><span class="badge ${stBg}">${esc(p.status||'—')}</span></td><td>${p.valorCausa?moneyBR(p.valorCausa):'—'}</td><td>${esc(p.comarca||'—')}</td></tr>`;
  });
  h+=`</tbody></table>`;h+=pdfFoot();openPDF(h,'Relatório de Processos');
}

async function repPrazos(){
  const prazos=(await dbAll('prazos')).filter(p=>p.status!=='cumprido');
  const proc=await dbAll('processos');
  const cfg=(await dbGet('config','escritorio'))||{};
  prazos.sort((a,b)=>(a.dataPrazo||'9').localeCompare(b.dataPrazo||'9'));
  const urg=prazos.filter(p=>{const d=daysUntil(p.dataPrazo);return d!==null&&d<=7;}).length;
  let h=pdfBase('Relatório de Prazos em Aberto',cfg);
  h+=`<div class="summary-grid">
    <div class="sum-box"><div class="sv">${prazos.length}</div><div class="sl">Prazos em aberto</div></div>
    <div class="sum-box"><div class="sv" style="color:#b23a3a">${prazos.filter(p=>daysUntil(p.dataPrazo)<0).length}</div><div class="sl">Vencidos</div></div>
    <div class="sum-box"><div class="sv" style="color:#c08a2a">${urg}</div><div class="sl">Urgentes (≤7 dias)</div></div>
  </div>
  <table><thead><tr><th>Descrição</th><th>Tipo</th><th>Processo</th><th>Vencimento</th><th>Situação</th><th>Prioridade</th></tr></thead><tbody>`;
  prazos.forEach(p=>{
    const d=daysUntil(p.dataPrazo);
    const sit=d<0?'<span class="badge badge-red">VENCIDO</span>':d===0?'<span class="badge badge-red">HOJE</span>':d<=3?`<span class="badge badge-amber">${d}d</span>`:`<span class="badge badge-blue">${d}d</span>`;
    const prio={'alta':'badge-red','media':'badge-amber','baixa':'badge-green'}[p.prioridade]||'badge-gray';
    h+=`<tr><td><b>${esc(p.descricao)}</b></td><td>${esc(p.tipo||'—')}</td><td style="font-size:11px">${esc(procLabel(proc,p.processoId)||'—')}</td><td><b>${fmtDate(p.dataPrazo)}</b></td><td>${sit}</td><td><span class="badge ${prio}">${esc(p.prioridade||'—')}</span></td></tr>`;
  });
  h+=`</tbody></table>`;h+=pdfFoot();openPDF(h,'Relatório de Prazos');
}

async function repFinanceiro(de,ate){
  let fin=await dbAll('financeiro');
  const cli=await dbAll('clientes');
  const cfg=(await dbGet('config','escritorio'))||{};
  if(de)fin=fin.filter(f=>(f.data||'')>=de);
  if(ate)fin=fin.filter(f=>(f.data||'')<=ate);
  fin.sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  const rec=fin.filter(f=>f.tipo==='receita'&&f.status==='pago').reduce((s,f)=>s+Number(f.valor||0),0);
  const desp=fin.filter(f=>f.tipo==='despesa'&&f.status==='pago').reduce((s,f)=>s+Number(f.valor||0),0);
  const pend=fin.filter(f=>f.status==='pendente').reduce((s,f)=>s+Number(f.valor||0),0);
  const periodo=de&&ate?` (${fmtDate(de)} a ${fmtDate(ate)})`:'';
  let h=pdfBase(`Relatório Financeiro${periodo}`,cfg);
  h+=`<div class="summary-grid">
    <div class="sum-box"><div class="sv" style="color:#3f7d54">${moneyBR(rec)}</div><div class="sl">Receitas recebidas</div></div>
    <div class="sum-box"><div class="sv" style="color:#b23a3a">${moneyBR(desp)}</div><div class="sl">Despesas pagas</div></div>
    <div class="sum-box"><div class="sv">${moneyBR(rec-desp)}</div><div class="sl">Saldo líquido</div></div>
  </div>
  <div class="section-h">Lançamentos</div>
  <table><thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Cliente</th><th>Situação</th><th style="text-align:right">Valor</th></tr></thead><tbody>`;
  fin.forEach(f=>{
    const tp=f.tipo==='receita'?'badge-green':'badge-red';
    const st=f.status==='pago'?`<span class="badge badge-green">${f.tipo==='receita'?'Recebido':'Pago'}</span>`:'<span class="badge badge-amber">Pendente</span>';
    h+=`<tr><td>${fmtDate(f.data)}</td><td>${esc(f.descricao)}</td><td>${esc(f.categoria||'—')}</td><td>${esc(cliName(cli,f.clienteId)||'—')}</td><td>${st}</td><td style="text-align:right;font-weight:700;color:${f.tipo==='receita'?'#3f7d54':'#b23a3a'}">${f.tipo==='receita'?'+':'−'} ${moneyBR(f.valor)}</td></tr>`;
  });
  h+=`</tbody></table>`;
  if(pend>0)h+=`<p style="font-size:13px;color:#c08a2a;font-weight:600">⚠ Valores pendentes (não inclusos acima): ${moneyBR(pend)}</p>`;
  h+=pdfFoot();openPDF(h,'Relatório Financeiro');
}

async function repHonorarios(){
  const entries=await dbAll('honorarios');
  const cli=await dbAll('clientes');
  const proc=await dbAll('processos');
  const cfg=(await dbGet('config','escritorio'))||{};
  entries.sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  const totalH=entries.reduce((s,e)=>s+Number(e.horas||0),0);
  const totalV=entries.reduce((s,e)=>s+Number(e.horas||0)*Number(e.valorHora||350),0);
  const fat=entries.filter(e=>e.status==='faturado').reduce((s,e)=>s+Number(e.horas||0)*Number(e.valorHora||350),0);
  let h=pdfBase('Relatório de Honorários por Hora',cfg);
  h+=`<div class="summary-grid">
    <div class="sum-box"><div class="sv">${totalH.toFixed(1)}h</div><div class="sl">Total de horas</div></div>
    <div class="sum-box"><div class="sv" style="color:#3f7d54">${moneyBR(fat)}</div><div class="sl">Faturado</div></div>
    <div class="sum-box"><div class="sv" style="color:#c08a2a">${moneyBR(totalV-fat)}</div><div class="sl">A faturar</div></div>
  </div>
  <table><thead><tr><th>Data</th><th>Atividade</th><th>Tipo</th><th>Cliente</th><th>Processo</th><th>Horas</th><th>Valor/h</th><th>Total</th><th>Status</th></tr></thead><tbody>`;
  entries.forEach(e=>{
    const tot=Number(e.horas||0)*Number(e.valorHora||350);
    const st=e.status==='faturado'?'<span class="badge badge-green">Faturado</span>':'<span class="badge badge-amber">Pendente</span>';
    h+=`<tr><td>${fmtDate(e.data)}</td><td>${esc(e.atividade)}</td><td>${esc(e.tipo||'—')}</td><td>${esc(cliName(cli,e.clienteId)||'—')}</td><td style="font-size:11px">${esc(procLabel(proc,e.processoId)||'—')}</td><td style="font-weight:700">${Number(e.horas||0).toFixed(1)}h</td><td>${moneyBR(e.valorHora||350)}</td><td style="font-weight:700;color:${e.status==='faturado'?'#3f7d54':'#c08a2a'}">${moneyBR(tot)}</td><td>${st}</td></tr>`;
  });
  h+=`</tbody></table>`;h+=pdfFoot();openPDF(h,'Relatório de Honorários');
}

async function repCompleto(de,ate){
  const [cli,proc,prazos,fin,hon]=await Promise.all(['clientes','processos','prazos','financeiro','honorarios'].map(dbAll));
  const cfg=(await dbGet('config','escritorio'))||{};
  let finFilt=fin.slice();
  if(de)finFilt=finFilt.filter(f=>(f.data||'')>=de);
  if(ate)finFilt=finFilt.filter(f=>(f.data||'')<=ate);
  const rec=finFilt.filter(f=>f.tipo==='receita'&&f.status==='pago').reduce((s,f)=>s+Number(f.valor||0),0);
  const desp=finFilt.filter(f=>f.tipo==='despesa'&&f.status==='pago').reduce((s,f)=>s+Number(f.valor||0),0);
  const totalH=hon.reduce((s,e)=>s+Number(e.horas||0),0);
  const prazosPend=prazos.filter(p=>p.status!=='cumprido');
  const periodo=de&&ate?` — ${fmtDate(de)} a ${fmtDate(ate)}`:'';
  let h=pdfBase(`Relatório Completo do Escritório${periodo}`,cfg);
  h+=`<div class="summary-grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="sum-box"><div class="sv">${cli.length}</div><div class="sl">Clientes</div></div>
    <div class="sum-box"><div class="sv">${proc.filter(p=>p.status!=='Encerrado'&&p.status!=='Arquivado').length}</div><div class="sl">Processos ativos</div></div>
    <div class="sum-box"><div class="sv" style="color:#3f7d54">${moneyBR(rec-desp)}</div><div class="sl">Saldo financeiro</div></div>
    <div class="sum-box"><div class="sv">${totalH.toFixed(1)}h</div><div class="sl">Horas trabalhadas</div></div>
  </div>
  <div class="section-h">Processos em Andamento</div>
  <table><thead><tr><th>Ação</th><th>Cliente</th><th>Área</th><th>Status</th><th>Valor da Causa</th></tr></thead><tbody>`;
  proc.filter(p=>p.status!=='Encerrado'&&p.status!=='Arquivado').slice(0,20).forEach(p=>{
    const stBg={'Em andamento':'badge-blue','Aguardando audiência':'badge-amber','Sentenciado':'badge-green'}[p.status]||'badge-gray';
    h+=`<tr><td><b>${esc(p.tipoAcao||'—')}</b></td><td>${esc(cliName(cli,p.clienteId))}</td><td>${esc(p.area||'—')}</td><td><span class="badge ${stBg}">${esc(p.status||'—')}</span></td><td>${p.valorCausa?moneyBR(p.valorCausa):'—'}</td></tr>`;
  });
  h+=`</tbody></table>
  <div class="section-h">Prazos Urgentes (próximos 15 dias)</div>
  <table><thead><tr><th>Prazo</th><th>Vencimento</th><th>Situação</th></tr></thead><tbody>`;
  prazosPend.filter(p=>{const d=daysUntil(p.dataPrazo);return d!==null&&d<=15;}).sort((a,b)=>(a.dataPrazo||'').localeCompare(b.dataPrazo||'')).forEach(p=>{
    const d=daysUntil(p.dataPrazo);
    h+=`<tr><td><b>${esc(p.descricao)}</b></td><td>${fmtDate(p.dataPrazo)}</td><td>${d<0?'<span class="badge badge-red">VENCIDO</span>':d<=3?`<span class="badge badge-amber">${d}d</span>`:`<span class="badge badge-blue">${d}d</span>`}</td></tr>`;
  });
  h+=`</tbody></table>
  <div class="section-h">Resumo Financeiro</div>
  <table><thead><tr><th>Descrição</th><th style="text-align:right">Valor</th></tr></thead><tbody>
    <tr><td>Receitas recebidas</td><td style="text-align:right;color:#3f7d54;font-weight:700">${moneyBR(rec)}</td></tr>
    <tr><td>Despesas pagas</td><td style="text-align:right;color:#b23a3a;font-weight:700">${moneyBR(desp)}</td></tr>
    <tr style="background:#f4f0e8"><td><b>Saldo líquido</b></td><td style="text-align:right;font-weight:700">${moneyBR(rec-desp)}</td></tr>
  </tbody></table>`;
  h+=pdfFoot();openPDF(h,'Relatório Completo');
}

(async function init(){
  try {
    await openDB();
  } catch(e) {
    // If DB upgrade fails (e.g. blocked by old tab), delete and retry
    console.warn('DB open failed, deleting and retrying:', e);
    try { indexedDB.deleteDatabase('lexora_db'); } catch(_){}
    await new Promise(r => setTimeout(r, 300));
    await openDB();
  }
  try { await seedIfEmpty(); } catch(e){ console.warn('seed error:', e); }
  try { buildNav(); } catch(e){ console.error('buildNav error:', e); }
  tickClock(); setInterval(tickClock, 30000);
  try {
    await goto('dashboard');
  } catch(e) {
    console.error('Dashboard render error:', e);
    $('#content').innerHTML = `<div style="padding:40px;font-family:sans-serif">
      <h2 style="color:#b23a3a">Erro ao carregar o painel</h2>
      <p style="color:#555;margin-top:8px">Detalhes: ${e.message}</p>
      <button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#16243f;color:#fff;border:none;border-radius:8px;cursor:pointer">🔄 Recarregar</button>
    </div>`;
  }
})();
